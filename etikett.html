<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Etiketter — Havøyet AS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Montserrat:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #0d9488;
      --dark: #0f172a;
      --bg: #f1f5f9;
      --border: #e2e8f0;
      --muted: #64748b;
      --surface: #ffffff;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--dark);
      min-height: 100vh;
    }

    /* ── TOPBAR ── */
    header {
      background: var(--dark);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; height: 56px;
      position: sticky; top: 0; z-index: 100;
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .back-btn {
      display: flex; align-items: center; gap: 6px;
      color: #94a3b8; text-decoration: none; font-size: 13px; font-weight: 500;
      padding: 6px 10px; border-radius: 6px; transition: color 0.15s, background 0.15s;
    }
    .back-btn:hover { color: #fff; background: #1e293b; }
    .divider { width: 1px; height: 20px; background: #334155; }
    .btn-print-all {
      background: var(--surface); color: var(--dark); border: none; border-radius: 8px;
      padding: 9px 20px; font-size: 13px; font-weight: 600; cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      display: flex; align-items: center; gap: 8px;
      transition: background 0.15s;
    }
    .btn-print-all:hover { background: #f1f5f9; }

    /* ── SCREEN TOOLBAR ── */
    .screen-toolbar {
      max-width: 960px; margin: 0 auto;
      padding: 28px 24px 16px;
      display: flex; align-items: flex-start; justify-content: space-between; gap: 16px;
    }
    .screen-title { font-size: 20px; font-weight: 600; color: var(--dark); }
    .screen-sub { font-size: 13px; color: var(--muted); margin-top: 3px; }
    .printer-info {
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      padding: 10px 16px; font-size: 12px; color: var(--muted); line-height: 1.7; text-align: right;
    }
    .printer-info strong { color: var(--dark); }

    /* ── LABELS AREA ── */
    .labels-area {
      max-width: 960px; margin: 0 auto;
      padding: 0 24px 80px;
      display: flex; flex-wrap: wrap; gap: 28px;
    }

    .label-card {
      background: #fff; border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.10), 0 0 0 1px rgba(0,0,0,0.06);
      overflow: hidden; display: flex; flex-direction: column;
    }
    .label-card-header {
      padding: 8px 14px; background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
      font-size: 11px; color: #94a3b8; font-weight: 500;
    }

    /* ═══════════════════════════════════════
       PREMIUM ETIKETT — 50 mm × 103 mm
       Hvit, minimalistisk, rent svart/hvitt
    ═══════════════════════════════════════ */
    .label {
      width: 50mm;
      height: 103mm;
      overflow: hidden;
      background: #fff;
      font-family: 'DM Sans', Arial, sans-serif;
      font-size: 5.4pt;
      line-height: 1.4;
      color: #111;
      display: flex;
      flex-direction: column;
    }

    /* ── LOGO-SEKSJON ── */
    .lbl-logo-section {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3mm 4mm 2mm;
      flex-shrink: 0;
    }
    .lbl-logo-section img {
      width: 34mm;
      height: auto;
      display: block;
      /* Gjør logoen 100% svart — alle piksler → svart, transparent forblir transparent */
      filter: brightness(0);
    }

    /* ── DIVIDER ── */
    .lbl-hr {
      border: none;
      border-top: 0.4pt solid #111;
      margin: 0 3mm;
      flex-shrink: 0;
    }
    .lbl-hr-thin {
      border: none;
      border-top: 0.3pt solid #ccc;
      margin: 0 3mm;
      flex-shrink: 0;
    }

    /* ── BODY ── */
    .lbl-body {
      padding: 1.5mm 3.5mm 2mm;
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .lbl-order {
      font-size: 4.6pt;
      color: #888;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 1.2mm;
      text-align: center;
    }

    .lbl-product {
      font-family: 'Montserrat', Arial, sans-serif;
      font-size: 9.5pt;
      font-weight: 700;
      color: #000;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      line-height: 1.15;
      margin-bottom: 0.6mm;
      text-align: center;
    }

    .lbl-subtitle {
      font-size: 4.6pt;
      color: #555;
      text-align: center;
      letter-spacing: 0.03em;
      margin-bottom: 1.6mm;
      font-style: italic;
    }

    .lbl-info-block { margin: 1.2mm 0; }
    .lbl-info-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 0.45mm 0;
    }
    .lbl-info-row .lbl-key {
      color: #888;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-size: 4.4pt;
    }
    .lbl-info-row .lbl-val {
      color: #000;
      font-weight: 600;
      font-size: 5.2pt;
      text-align: right;
    }

    .lbl-ing-block { margin: 0.5mm 0 0.8mm; }
    .lbl-ing-title {
      font-size: 4.4pt;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 0.4mm;
    }
    .lbl-ing-text {
      font-size: 4.6pt;
      color: #333;
      line-height: 1.45;
    }
    .lbl-ing-allergy {
      font-size: 4.4pt;
      color: #555;
      margin-top: 0.4mm;
    }
    .lbl-ing-allergy strong { color: #000; font-weight: 700; }

    .lbl-nutr-title {
      font-size: 4.4pt;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 0.4mm;
    }
    .lbl-nutr-table {
      width: 100%;
      font-size: 4.6pt;
      border-collapse: collapse;
    }
    .lbl-nutr-table td { padding: 0.12mm 0; vertical-align: bottom; }
    .lbl-nutr-table .n-name { width: 68%; color: #333; }
    .lbl-nutr-table .n-val  { text-align: right; color: #000; white-space: nowrap; font-weight: 500; }
    .lbl-nutr-table .n-sub  { padding-left: 2mm; color: #666; font-size: 4.2pt; }

    .lbl-footer {
      font-size: 3.9pt;
      color: #999;
      margin-top: auto;
      padding-top: 1mm;
      text-align: center;
      letter-spacing: 0.04em;
    }

    /* ── PRINT ── */
    @media print {
      @page { size: 50mm 103mm; margin: 0; }
      body { background: none !important; }
      header, .screen-toolbar { display: none !important; }
      .labels-area { padding: 0 !important; margin: 0 !important; gap: 0 !important; display: block !important; }
      .label-card { box-shadow: none !important; border-radius: 0 !important; page-break-after: always; break-after: page; }
      .label-card-header { display: none !important; }
      .label { width: 50mm !important; height: 103mm !important; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <a class="back-btn" id="backBtn" href="pakke.html">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Tilbake
    </a>
    <div class="divider"></div>
    <span style="font-family:'Montserrat',sans-serif;font-weight:900;font-size:20px;letter-spacing:2px;color:#fff">Havøyet</span>
    <span style="color:#475569;font-size:13px;font-family:'DM Mono',monospace">/ etiketter</span>
  </div>
  <button class="btn-print-all" onclick="window.print()">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="6 9 6 2 18 2 18 9"/>
      <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
      <rect x="6" y="14" width="12" height="8"/>
    </svg>
    Skriv ut etiketter
  </button>
</header>

<div class="screen-toolbar">
  <div>
    <div class="screen-title" id="pageTitle">Etiketter</div>
    <div class="screen-sub" id="labelCount"></div>
  </div>
  <div class="printer-info">
    <strong>Brother QL-1110NWB</strong><br>
    Etikett: 50 mm × 103 mm<br>
    Koblingsmodus: Bluetooth / WiFi
  </div>
</div>

<div class="labels-area" id="labelsArea">
  <div style="color:var(--muted);font-size:14px;padding:20px 0">Laster etiketter…</div>
</div>

<script>
// ─── ERNÆRINGSBASE ────────────────────────────
const NUTR_DB = [
  { kw:['plukkfisk','bergens plukkfisk'],
    ing:'FISK (torsk, sei), poteter, MELK, setersmør, potetmos (Potet 98\u00a0%), naturlig aroma, emulgator, natriumdiSULFITT, antioksidant, sitronpepper, salt, gressløk',
    all:'FISK, MELK, SULFITT',
    kj:514, kcal:92, fett:5.5, mf:2.6, ko:8.5, sugar:0.8, prot:10.5, salt:1.0, opb:'Kjølevare 0–4 °C' },

  { kw:['blåkveite røkt','blåkveitefilet røkt','blåkveite, røkt'],
    ing:'Blåkveite 98 %, salt 2 %', all:'FISK',
    kj:645, kcal:155, fett:11.0, mf:1.7, ko:0.0, prot:14.0, salt:2.0, opb:'0–4 °C' },
  { kw:['blåkveite'],
    ing:'Blåkveite (Reinhardtius hippoglossoides)', all:'FISK',
    kj:600, kcal:143, fett:9.5, mf:1.4, ko:0.0, prot:15.0, salt:0.1, opb:'0–4 °C' },
  { kw:['laks, røkt','røkt laks','laks røkt'],
    ing:'Atlanterhavslaks 96 %, salt, røyk', all:'FISK',
    kj:916, kcal:219, fett:16.0, mf:3.5, ko:0.0, prot:18.0, salt:2.5, opb:'0–4 °C' },
  { kw:['atlanterhavslaks','laks'],
    ing:'Atlanterhavslaks (Salmo salar)', all:'FISK',
    kj:770, kcal:184, fett:12.0, mf:2.5, ko:0.0, prot:20.0, salt:0.1, opb:'0–4 °C' },
  { kw:['ørret','regnbueørret'],
    ing:'Ørret (Oncorhynchus mykiss)', all:'FISK',
    kj:607, kcal:145, fett:7.5, mf:1.5, ko:0.0, prot:20.0, salt:0.1, opb:'0–4 °C' },
  { kw:['torsk, røkt','røkt torsk'],
    ing:'Torsk 96 %, salt, røyk', all:'FISK',
    kj:490, kcal:117, fett:1.5, mf:0.3, ko:0.0, prot:27.0, salt:2.5, opb:'0–4 °C' },
  { kw:['torsk'],
    ing:'Torsk (Gadus morhua)', all:'FISK',
    kj:340, kcal:81, fett:0.7, mf:0.1, ko:0.0, prot:18.0, salt:0.1, opb:'0–4 °C' },
  { kw:['sei, røkt','røkt sei'],
    ing:'Sei 96 %, salt, røyk', all:'FISK',
    kj:480, kcal:115, fett:1.2, mf:0.2, ko:0.0, prot:27.0, salt:2.4, opb:'0–4 °C' },
  { kw:['sei'],
    ing:'Sei (Pollachius virens)', all:'FISK',
    kj:340, kcal:81, fett:0.9, mf:0.2, ko:0.0, prot:18.0, salt:0.1, opb:'0–4 °C' },
  { kw:['kveite'],
    ing:'Kveite (Hippoglossus hippoglossus)', all:'FISK',
    kj:431, kcal:103, fett:2.5, mf:0.5, ko:0.0, prot:21.0, salt:0.1, opb:'0–4 °C' },
  { kw:['kongekrabbe'],
    ing:'Kongekrabbe (Paralithodes camtschaticus)', all:'SKALLDYR',
    kj:385, kcal:92, fett:1.2, mf:0.2, ko:0.0, prot:20.0, salt:0.5, opb:'0–4 °C' },
  { kw:['krabbe'],
    ing:'Krabbe (Cancer pagurus)', all:'SKALLDYR',
    kj:374, kcal:89, fett:1.5, mf:0.2, ko:0.0, prot:19.0, salt:0.5, opb:'0–4 °C' },
  { kw:['hummer'],
    ing:'Hummer (Homarus gammarus)', all:'SKALLDYR',
    kj:360, kcal:86, fett:0.9, mf:0.2, ko:0.3, prot:19.0, salt:0.3, opb:'0–4 °C' },
  { kw:['reker'],
    ing:'Reker (Pandalus borealis)', all:'SKALLDYR',
    kj:331, kcal:79, fett:1.0, mf:0.2, ko:0.2, prot:17.0, salt:0.4, opb:'0–4 °C' },
  { kw:['kamskjell'],
    ing:'Kamskjell (Pecten maximus)', all:'BLØTDYR',
    kj:335, kcal:80, fett:0.8, mf:0.1, ko:2.0, prot:16.0, salt:0.4, opb:'0–4 °C' },
  { kw:['østers'],
    ing:'Østers (Ostrea edulis)', all:'BLØTDYR',
    kj:275, kcal:66, fett:1.8, mf:0.4, ko:3.8, prot:9.0, salt:0.5, opb:'0–4 °C' },
  { kw:['blåskjell'],
    ing:'Blåskjell (Mytilus edulis)', all:'BLØTDYR',
    kj:360, kcal:86, fett:2.2, mf:0.4, ko:3.7, prot:12.0, salt:0.7, opb:'0–4 °C' },
];

const FALLBACK = {
  ing:'Sjømat', all:'FISK/SKALLDYR/BLØTDYR',
  kj:380, kcal:91, fett:2.0, mf:0.4, ko:0.0, prot:19.0, salt:0.2, opb:'0–4 °C'
};

function lookupNutr(name) {
  const n = name.toLowerCase().replace(/\s*\([^)]*\)/g,'').trim();
  for (const e of NUTR_DB) {
    if (e.kw.some(k => n.includes(k) || k.includes(n))) return e;
  }
  return FALLBACK;
}

function fmtN(v) {
  const s = Number.isInteger(v) ? v + ',0' : String(v).replace('.',',');
  return s.includes(',') ? s : s + ',0';
}

function fmtDate(iso) {
  if (!iso) return '–';
  const d = new Date(iso + 'T00:00:00');
  return String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0');
}

function nutrRow(label, val, sub) {
  const subCls = sub ? ' class="n-sub"' : ' class="n-main"';
  const rowCls = sub ? '' : ' class="n-main"';
  return `<tr${rowCls}><td class="n-name${sub?' n-sub':''}">${label}</td><td class="n-val">${val}</td></tr>`;
}

// Lookup the FAO capture area from product name
function faoArea(name) {
  const n = name.toLowerCase();
  if (n.includes('atlanterhav') || n.includes('torsk') || n.includes('sei') || n.includes('kveite') || n.includes('blåkveite') || n.includes('hyse') || n.includes('laks') || n.includes('ørret')) return 'Nordøst-Atlanteren (FAO\u00a027)';
  if (n.includes('krabbe') || n.includes('reker') || n.includes('hummer')) return 'Nordøst-Atlanteren (FAO\u00a027)';
  return 'Nordøst-Atlanteren (FAO\u00a027)';
}

function buildLabel(order, name, weight, expiry) {
  const n  = lookupNutr(name);
  const cleanName = name.replace(/\s*\([^)]*\)/g,'').trim();
  const ordNum = order.id.startsWith('#') ? order.id : '#' + order.id.replace(/^M-/,'');
  const area = faoArea(cleanName);

  const sugarRow = n.sugar != null
    ? nutrRow('– herav sukkerarter', `${fmtN(n.sugar)}\u00a0g`, true)
    : '';

  return `<div class="label">

  <div class="lbl-logo-section">
    <img src="Color logo - no background.png" alt="Havøyet">
  </div>

  <div class="lbl-hr"></div>

  <div class="lbl-body">

    <div class="lbl-order">Bestilling\u00a0${ordNum} &nbsp;·&nbsp; ${order.customer}</div>

    <div class="lbl-product">${cleanName}</div>
    <div class="lbl-subtitle">Fanget i havet\u00a0– ${area}</div>

    <div class="lbl-hr"></div>

    <div class="lbl-info-block">
      <div class="lbl-info-row">
        <span class="lbl-key">Nettovekt</span>
        <span class="lbl-val">${weight ? weight + '\u00a0g' : '–'}</span>
      </div>
      <div class="lbl-info-row">
        <span class="lbl-key">Siste forbruksdag</span>
        <span class="lbl-val">${fmtDate(expiry)}</span>
      </div>
      <div class="lbl-info-row">
        <span class="lbl-key">Oppbevares ved</span>
        <span class="lbl-val">${n.opb}</span>
      </div>
    </div>

    <div class="lbl-hr"></div>

    <div class="lbl-ing-block">
      <div class="lbl-ing-title">Ingredienser</div>
      <div class="lbl-ing-text">${n.ing}</div>
      <div class="lbl-ing-allergy">Allergener: <strong>${n.all}</strong></div>
    </div>

    <div class="lbl-hr"></div>

    <div class="lbl-nutr-title">Næringsinnhold per 100\u00a0g</div>
    <table class="lbl-nutr-table">
      ${nutrRow('Energi', `${n.kj}\u00a0kJ\u00a0/\u00a0${n.kcal}\u00a0kcal`)}
      ${nutrRow('Fett', `${fmtN(n.fett)}\u00a0g`)}
      ${nutrRow('– mettede fettsyrer', `${fmtN(n.mf)}\u00a0g`, true)}
      ${nutrRow('Karbohydrater', `${fmtN(n.ko)}\u00a0g`)}
      ${sugarRow}
      ${nutrRow('Protein', `${fmtN(n.prot)}\u00a0g`)}
      ${nutrRow('Salt', `${fmtN(n.salt)}\u00a0g`)}
    </table>

    <div class="lbl-footer">
      Pakket av: Havøyet AS, Bergen &nbsp;·&nbsp; havoyet.no
    </div>

  </div>
</div>`;
}

// ─── DATA ────────────────────────────────────
function getAllOrders() {
  const list = [];
  try { list.push(...JSON.parse(localStorage.getItem('havøyet_orders') || '[]')); } catch(e){}
  try {
    const m = JSON.parse(localStorage.getItem('havøyet_manual_orders') || '[]');
    m.forEach(o => { if (!list.find(x => x.id === o.id)) list.push(o); });
  } catch(e){}
  try {
    const hidden = JSON.parse(localStorage.getItem('havøyet_hidden_orders') || '[]');
    return list.filter(o => !hidden.includes(o.id));
  } catch(e) { return list; }
}

function getState() {
  try { return JSON.parse(localStorage.getItem('havøyet_state') || '{}'); } catch(e) { return {}; }
}

// ─── RENDER ──────────────────────────────────
const params  = new URLSearchParams(location.search);
const ordreId = params.get('ordre');

document.getElementById('backBtn').href = ordreId
  ? `pakke.html?ordre=${encodeURIComponent(ordreId)}`
  : 'pakke.html';

const allOrders = getAllOrders();
const STATE     = getState();
const labels    = [];

function collectLabels(rawOrder) {
  const s = STATE[rawOrder.id] || [];
  const order = { id: rawOrder.id, customer: rawOrder.customer, phone: rawOrder.phone || null };
  (rawOrder.items || []).forEach((item, i) => {
    const st = s[i] || {};
    if (st.avail === 'ok' && st.weight && st.expiry) {
      labels.push({ order, name: item.name || '', weight: st.weight, expiry: st.expiry });
    }
  });
}

if (ordreId) {
  const raw = allOrders.find(o => String(o.id) === ordreId);
  if (raw) collectLabels(raw);
} else {
  allOrders.forEach(collectLabels);
}

const area = document.getElementById('labelsArea');
document.getElementById('pageTitle').textContent = ordreId && labels[0]
  ? `Etiketter — ${labels[0].order.customer}`
  : 'Alle etiketter';
document.getElementById('labelCount').textContent =
  `${labels.length} etikett${labels.length !== 1 ? 'er' : ''} klar for utskrift`;

if (!labels.length) {
  area.innerHTML = `<div style="padding:40px 0;color:var(--muted);font-size:14px">
    Ingen bekreftede varer funnet.<br>
    <span style="font-size:13px">Merk varer som <em>Tilgjengelig</em> med vekt og holdbarhetsdato i pakkevisningen.</span>
  </div>`;
} else {
  area.innerHTML = labels.map(({ order, name, weight, expiry }, idx) => `
    <div class="label-card">
      <div class="label-card-header">
        ${order.customer} &nbsp;·&nbsp; ${name.replace(/\s*\([^)]*\)/g,'').trim()} &nbsp;·&nbsp; Etikett ${idx+1} av ${labels.length}
      </div>
      ${buildLabel(order, name, weight, expiry)}
    </div>
  `).join('');
}
</script>
</body>
</html>
