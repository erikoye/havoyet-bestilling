<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>Sjåfør — Havøyet</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="">
  <style>
    /* Palett synkronisert med admin.html */
    :root{--primary:#0d9488;--primary-dk:#0f766e;--bg:#f1f5f9;--dark:#0f172a;
          --surface:#ffffff;--border:#e2e8f0;--muted:#64748b;
          --ok:#22c55e;--err:#ef4444;
          /* Aliaser så resten av CSS-en under fortsatt funker */
          --blue:#0f172a;--gold:#0d9488;--ink:#0f172a;--soft:#64748b;--line:#e2e8f0}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,
              "Segoe UI",sans-serif;background:var(--bg);color:var(--ink);
              overscroll-behavior:none}

    /* ── PIN-skjerm ──────────────────────────────────────── */
    .pin-screen{position:fixed;inset:0;background:var(--blue);color:#fff;
                display:flex;flex-direction:column;align-items:center;justify-content:center;
                padding:24px;z-index:9999}
    .pin-screen .brand{font-weight:700;font-size:22px;margin-bottom:6px;color:var(--gold)}
    .pin-screen p{color:rgba(255,255,255,.75);margin:0 0 28px;font-size:14px}
    .pin-input{font-size:32px;letter-spacing:18px;width:180px;padding:14px 0 14px 18px;
               text-align:center;background:rgba(255,255,255,.1);color:#fff;
               border:2px solid rgba(255,255,255,.25);border-radius:12px;
               font-family:-apple-system,sans-serif;font-weight:600;
               -webkit-text-security:disc}
    .pin-input:focus{outline:none;border-color:var(--gold);
                     background:rgba(255,255,255,.18)}
    .pin-btn{margin-top:18px;background:var(--gold);color:var(--blue);
             border:none;border-radius:10px;padding:14px 32px;font-size:16px;
             font-weight:700;cursor:pointer;width:200px}
    .pin-err{color:#fca5a5;margin-top:14px;font-size:13px;min-height:18px}

    /* ── Hovedvisning ────────────────────────────────────── */
    .app{display:flex;flex-direction:column;height:100dvh}
    .topbar{background:var(--blue);color:#fff;padding:env(safe-area-inset-top) 14px 12px;
            display:flex;align-items:center;gap:10px;flex-shrink:0;
            padding-top:max(env(safe-area-inset-top),12px)}
    .topbar .brand{font-weight:700;font-size:15px;color:var(--gold);flex:0 0 auto}
    .topbar .summary{font-size:12px;color:rgba(255,255,255,.85);flex:1;
                     line-height:1.4}
    .topbar .summary b{color:#fff;font-size:14px}
    .topbar .menu-btn{background:rgba(255,255,255,.12);border:none;color:#fff;
                      width:36px;height:36px;border-radius:8px;font-size:18px;
                      cursor:pointer}

    /* Datovelger-rad under topbaren — sjåfør kan se i morgen / forrige dag */
    .date-bar{background:var(--blue);color:#fff;padding:0 12px 10px;
              display:flex;align-items:center;gap:8px;flex-shrink:0;
              border-bottom:1px solid rgba(255,255,255,.08)}
    .date-bar .date-btn{background:rgba(255,255,255,.12);border:none;color:#fff;
                        width:36px;height:36px;border-radius:8px;font-size:18px;
                        cursor:pointer;flex-shrink:0}
    .date-bar .date-label{flex:1;text-align:center;font-size:14px;font-weight:600;
                          font-variant-numeric:tabular-nums}
    .date-bar .date-label small{display:block;font-size:11px;color:rgba(255,255,255,.7);
                                font-weight:500;margin-top:1px;text-transform:uppercase;
                                letter-spacing:.5px}

    /* Godkjenningsbanner — tydelig markert som forhåndsvisning */
    .approval-banner{background:#fef3c7;color:#854d0e;border-bottom:2px solid #ca8a04;
                     padding:10px 14px;display:flex;align-items:center;gap:10px;
                     font-size:13px;line-height:1.4;flex-shrink:0}
    .approval-banner .icon{font-size:20px;flex-shrink:0}
    .approval-banner b{display:block;font-size:13px}
    .approval-banner small{display:block;font-size:11px;color:#92400e;margin-top:1px}

    #map{flex:0 0 38vh;width:100%;background:#dde}
    @media (min-height:800px){ #map{flex-basis:42vh} }

    .stops-panel{flex:1;overflow-y:auto;padding:10px 12px 24px;
                 padding-bottom:max(env(safe-area-inset-bottom),24px)}

    .next-card{background:linear-gradient(135deg,var(--dark),#1e293b);color:#fff;
               border-radius:14px;padding:16px 16px 14px;margin-bottom:14px;
               box-shadow:0 6px 18px rgba(15,23,42,.25)}
    .next-card .label{color:var(--gold);font-size:11px;letter-spacing:.8px;
                      text-transform:uppercase;font-weight:700}
    .next-card .name{font-size:20px;font-weight:700;margin:4px 0 2px;line-height:1.2}
    .next-card .addr{font-size:13px;color:rgba(255,255,255,.85);line-height:1.4}
    .next-card .meta{display:flex;gap:14px;margin-top:12px;font-size:13px;
                     color:rgba(255,255,255,.95)}
    .next-card .meta .val{font-weight:700;font-size:18px;color:#fff;
                          font-variant-numeric:tabular-nums}
    .next-card .nav-btn{display:flex;align-items:center;justify-content:center;
                        gap:8px;width:100%;background:var(--gold);color:var(--blue);
                        border:none;border-radius:10px;padding:14px;font-weight:700;
                        font-size:15px;margin-top:14px;cursor:pointer;
                        text-decoration:none}
    .next-card .nav-btn:active{filter:brightness(.92)}

    .stop{background:#fff;border:1px solid var(--line);border-radius:10px;
          padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:12px;
          min-height:64px}
    .stop.done{opacity:.5}
    .stop-num{background:var(--blue);color:#fff;width:32px;height:32px;
              border-radius:50%;display:flex;align-items:center;justify-content:center;
              font-weight:700;font-size:14px;flex:0 0 32px}
    .stop.done .stop-num{background:var(--ok)}
    .stop-info{flex:1;min-width:0}
    .stop-info .name{font-weight:600;font-size:15px;line-height:1.3;
                     white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .stop-info .addr{font-size:12px;color:var(--soft);line-height:1.3;margin-top:2px;
                     white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .stop-info .clock{display:inline-block;background:rgba(13,148,136,.12);
                      color:var(--primary-dk);font-weight:700;font-size:12px;
                      padding:2px 8px;border-radius:5px;margin-top:4px;
                      font-variant-numeric:tabular-nums}
    .stop-info .slot{display:inline-block;color:var(--soft);font-size:11px;
                     margin-left:6px}
    .stop-eta{flex:0 0 auto;text-align:right;font-weight:700;color:var(--blue);
              font-variant-numeric:tabular-nums;font-size:14px}
    .stop-eta small{display:block;color:var(--soft);font-weight:500;font-size:10px;
                    text-transform:uppercase;letter-spacing:.5px}

    /* Pause-rad mellom stopp */
    .break-row{background:#fef9c3;border:1px solid #fde68a;border-radius:10px;
               padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;
               gap:10px;color:#854d0e;font-size:13px}
    .break-row .icon{font-size:18px;flex-shrink:0}
    .break-row b{font-variant-numeric:tabular-nums}

    /* Depot-rad — start fra butikken */
    .depot-row{background:linear-gradient(135deg,var(--dark),#1e293b);color:#fff;
               border-radius:10px;padding:12px;margin-bottom:8px;display:flex;
               align-items:center;gap:12px}
    .depot-row .icon{background:var(--gold);color:var(--blue);width:32px;height:32px;
                     border-radius:8px;display:flex;align-items:center;justify-content:center;
                     font-weight:700;flex:0 0 32px;font-size:16px}
    .depot-row .info{flex:1}
    .depot-row .info b{font-size:15px}
    .depot-row .info small{display:block;font-size:11px;color:rgba(255,255,255,.7);
                           margin-top:2px}
    .depot-row .clock{font-weight:700;font-size:14px;color:var(--gold);
                      font-variant-numeric:tabular-nums}

    .nav-small{background:none;border:none;color:var(--blue);font-size:18px;
               cursor:pointer;padding:6px 8px}
    .empty{text-align:center;padding:48px 18px;color:var(--soft);font-size:14px}
    .pulse-dot{display:inline-block;width:7px;height:7px;border-radius:50%;
               background:var(--ok);margin-right:4px;animation:p 1.4s ease-in-out infinite}
    @keyframes p{50%{opacity:.35}}
  </style>
</head>
<body>

<!-- PIN-skjerm -->
<div class="pin-screen" id="pinScreen" style="display:none">
  <div class="brand">Havøyet</div>
  <p>Skriv inn sjåfør-PIN for å starte</p>
  <input type="tel" inputmode="numeric" pattern="[0-9]*" class="pin-input" id="pin"
         maxlength="4" autocomplete="one-time-code" autofocus>
  <button class="pin-btn" id="pinBtn">Logg inn</button>
  <div class="pin-err" id="pinErr"></div>
</div>

<!-- Hovedvisning -->
<div class="app" id="app" style="display:none">
  <div class="topbar">
    <span class="brand">Havøyet</span>
    <div class="summary" id="summary">Laster …</div>
    <button class="menu-btn" id="refreshBtn" title="Last på nytt">⟳</button>
    <button class="menu-btn" id="logoutBtn" title="Logg ut">⏻</button>
  </div>
  <div class="date-bar">
    <button class="date-btn" id="datePrev" aria-label="Forrige dag">‹</button>
    <div class="date-label" id="dateLabel">—</div>
    <button class="date-btn" id="dateNext" aria-label="Neste dag">›</button>
  </div>
  <div id="approvalBanner" style="display:none"></div>
  <div id="map"></div>
  <div class="stops-panel">
    <div id="nextCard"></div>
    <div id="stops"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>
<script>
const $ = id => document.getElementById(id);
const PIN_KEY = "havoyet_driver_pin";
const today = () => new Date().toISOString().slice(0,10);
// Aktiv dato — kan endres med pil-knappene i topbaren
let activeDate = today();

function _isoToDate(iso) {
  const [y, m, d] = String(iso).split('-').map(Number);
  return new Date(y, (m||1)-1, d||1);
}
function _dateToIso(dt) {
  const yy = dt.getFullYear();
  const mm = String(dt.getMonth() + 1).padStart(2, '0');
  const dd = String(dt.getDate()).padStart(2, '0');
  return `${yy}-${mm}-${dd}`;
}
function _humanDate(iso) {
  const dt = _isoToDate(iso);
  const t = _isoToDate(today());
  const diff = Math.round((dt - t) / (1000 * 60 * 60 * 24));
  const weekday = dt.toLocaleDateString('nb-NO', { weekday: 'long' });
  const pretty = `${weekday.charAt(0).toUpperCase()}${weekday.slice(1)} ${dt.getDate()}.${String(dt.getMonth()+1).padStart(2,'0')}`;
  let rel = '';
  if (diff === 0) rel = 'I dag';
  else if (diff === 1) rel = 'I morgen';
  else if (diff === -1) rel = 'I går';
  else if (diff > 1) rel = `Om ${diff} dager`;
  else rel = `${Math.abs(diff)} dager siden`;
  return { pretty, rel };
}
function updateDateLabel() {
  const { pretty, rel } = _humanDate(activeDate);
  $("dateLabel").innerHTML = `${pretty}<small>${rel}</small>`;
}
function shiftDate(delta) {
  const dt = _isoToDate(activeDate);
  dt.setDate(dt.getDate() + delta);
  activeDate = _dateToIso(dt);
  updateDateLabel();
  loadRoute();
}

let map, vehicleMarker, routeLine;
const stopLayer = (typeof L !== "undefined") ? L.layerGroup() : null;
const stopMarkers = {};
let currentRoute = null;
let livePollTimer = null;
// Pause polling når sjåføren låser telefonen eller bytter app
document.addEventListener('visibilitychange', () => {
  if (document.hidden && livePollTimer) {
    clearInterval(livePollTimer);
    livePollTimer = null;
  } else if (!document.hidden && currentRoute && !livePollTimer) {
    livePollTimer = setInterval(pollLive, 30000);
    pollLive();
  }
});

function getPin(){ return localStorage.getItem(PIN_KEY) || ""; }
function setPin(v){ localStorage.setItem(PIN_KEY, v); }
function clearPin(){ localStorage.removeItem(PIN_KEY); }

async function tryAuth(pin){
  const r = await fetch("/api/driver/auth", {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({pin}),
  });
  return r.ok;
}

async function showPinScreen(msg){
  $("app").style.display = "none";
  $("pinScreen").style.display = "flex";
  if (msg) $("pinErr").textContent = msg;
  setTimeout(() => $("pin").focus(), 100);
}

async function showApp(){
  $("pinScreen").style.display = "none";
  $("app").style.display = "flex";
  if (!map) initMap();
  await loadRoute();
}

function initMap(){
  map = L.map("map", {zoomControl:true, attributionControl:false}).setView([60.39, 5.32], 11);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {maxZoom:19}).addTo(map);
  stopLayer.addTo(map);
}

function makeStopIcon(num, done){
  const color = done ? "#22c55e" : "#0f172a";
  return L.divIcon({
    className: "",
    html: `<div style="background:${color};color:#fff;width:30px;height:30px;
            border-radius:50%;display:flex;align-items:center;justify-content:center;
            font-weight:700;font-size:13px;border:3px solid #fff;
            box-shadow:0 2px 6px rgba(0,0,0,.3)">${num}</div>`,
    iconSize:[30,30], iconAnchor:[15,15],
  });
}
function makeVehicleIcon(){
  return L.divIcon({
    className: "",
    html: `<div style="background:#0d9488;border:3px solid #fff;
            width:24px;height:24px;border-radius:50%;
            box-shadow:0 0 0 4px rgba(13,148,136,.3);
            animation:vp 1.6s ease-in-out infinite"></div>
           <style>@keyframes vp{50%{box-shadow:0 0 0 14px rgba(13,148,136,0)}}</style>`,
    iconSize:[24,24], iconAnchor:[12,12],
  });
}

function navLink(lat, lon, label){
  // Apple Maps universal, fallback til Google Maps på Android
  const isApple = /iPhone|iPad|iPod|Mac/.test(navigator.platform);
  if (isApple) return `maps://?daddr=${lat},${lon}&dirflg=d`;
  return `https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}&travelmode=driving`;
}

async function fetchRoute(){
  const r = await fetch(`/api/driver/route/today?date=${activeDate}&pin=${encodeURIComponent(getPin())}`);
  if (r.status === 401) { clearPin(); showPinScreen("Sesjonen utløp. Logg inn på nytt."); return null; }
  if (!r.ok) return null;
  return r.json();
}

function renderApprovalBanner(data){
  const box = $("approvalBanner");
  if (!data || data.error === "no_depot" || !(data.stops || []).length) {
    box.style.display = "none";
    return;
  }
  if (data.awaiting_approval) {
    box.innerHTML = `
      <div class="approval-banner">
        <div class="icon">⚠️</div>
        <div>
          <b>Forhåndsvisning — ikke godkjent</b>
          <small>Admin må godkjenne ruten før den er offisiell. Du ser den planlagte ruten her, men kunder har ikke fått SMS ennå.</small>
        </div>
      </div>`;
    box.style.display = "block";
  } else {
    box.style.display = "none";
  }
}

async function loadRoute(){
  $("summary").textContent = "Laster …";
  $("stops").innerHTML = "";
  $("nextCard").innerHTML = "";
  $("approvalBanner").style.display = "none";
  stopLayer.clearLayers();
  if (routeLine) { map.removeLayer(routeLine); routeLine = null; }

  const data = await fetchRoute();
  if (!data) return;
  currentRoute = data;

  if (data.error === "no_depot") {
    $("summary").innerHTML = "Depot ikke konfigurert";
    return;
  }

  renderApprovalBanner(data);

  const stops = data.stops || [];
  if (!stops.length) {
    const label = data.awaiting_approval ? "Ingen ordrer denne dagen" : "Ingen leveringer i dag";
    $("summary").innerHTML = label;
    $("stops").innerHTML = `<div class="empty">Ingen ordrer med leveringsdato ${data.date}.</div>`;
    return;
  }

  const startClock = data.start_clock || "—";
  const statusPill = data.awaiting_approval
    ? '<span style="color:#fbbf24">● Ikke godkjent</span>'
    : '<span style="color:#22c55e">● Godkjent</span>';
  $("summary").innerHTML = `<b>${stops.length}</b> stopp · start <b>${startClock}</b><br>${statusPill}
    ${data.vehicle ? ' · <span class="pulse-dot"></span>Bil online' : ''}`;

  if (data.geometry?.coordinates && data.geometry.coordinates.length > 1) {
    const latlngs = data.geometry.coordinates.map(([lon,lat]) => [lat,lon]);
    routeLine = L.polyline(latlngs, {color:"#0d9488", weight:4, opacity:.7}).addTo(map);
  } else if (data.depot) {
    // Fallback rettlinje gjennom depot + stopp så ruten alltid vises
    const fallback = [[data.depot.lat, data.depot.lon]]
      .concat(stops.filter(s => s.lat != null && s.lon != null).map(s => [s.lat, s.lon]));
    if (fallback.length > 1) {
      routeLine = L.polyline(fallback, {
        color: "#0d9488", weight: 3, opacity: .55, dashArray: "6 6",
      }).addTo(map);
    }
  }

  for (const s of stops) {
    const m = L.marker([s.lat, s.lon], {icon: makeStopIcon(s.stop_index)}).addTo(stopLayer);
    stopMarkers[s.order_id] = m;
  }

  // Neste stopp = første som ikke er levert
  const next = stops[0];
  $("nextCard").innerHTML = `
    <div class="next-card">
      <div class="label">Neste stopp · ${next.stop_index} av ${stops.length}${data.awaiting_approval ? ' · FORHÅNDSVISNING' : ''}</div>
      <div class="name">${next.navn || ('Bestilling #'+next.order_id)}</div>
      <div class="addr">${[next.adresse, next.postnr, next.poststed].filter(Boolean).join(", ") || "(adresse mangler)"}</div>
      <div class="meta">
        ${next.arrival_clock ? `<div><div style="opacity:.7;font-size:11px">Planlagt</div><span class="val">${next.arrival_clock}</span></div>` : ""}
        <div><div style="opacity:.7;font-size:11px">ETA</div><span class="val" data-next-eta>—</span> min</div>
        ${next.leveringstid ? `<div><div style="opacity:.7;font-size:11px">Vindu</div><span class="val">${next.leveringstid}</span></div>` : ""}
        ${next.tlf ? `<div><div style="opacity:.7;font-size:11px">Telefon</div><a href="tel:${next.tlf}" style="color:#fff;text-decoration:underline">${next.tlf}</a></div>` : ""}
      </div>
      <a class="nav-btn" href="${navLink(next.lat, next.lon, next.navn)}" target="_blank">
        🧭 Naviger hit
      </a>
    </div>`;

  // Hjelpere for å plassere pause-rader i listen
  const breaks = Array.isArray(data.breaks) ? data.breaks : [];
  const breaksForAnchor = (anchorId) => breaks.filter(b => String(b.after_order_id) === String(anchorId));
  const breakRowHtml = (b) => `
    <div class="break-row">
      <span class="icon">☕</span>
      <div>Pause <b>${b.minutes} min</b>${b.label ? ` — ${b.label}` : ''}</div>
    </div>`;

  // Depot-rad øverst + stoppene med eventuelle pauser før hver
  const depotHtml = `
    <div class="depot-row">
      <span class="icon">⌂</span>
      <div class="info"><b>Start fra butikken</b><small>Nesttunvegen 96, 5221 Nesttun</small></div>
      <div class="clock">${startClock}</div>
    </div>` + breaksForAnchor('depot').map(breakRowHtml).join('');

  const stopsHtml = stops.map((s, i) => {
    const breaksBefore = i === 0 ? '' : breaksForAnchor(String(stops[i-1].order_id)).map(breakRowHtml).join('');
    return `${breaksBefore}
    <div class="stop" data-id="${s.order_id}">
      <span class="stop-num">${s.stop_index}</span>
      <div class="stop-info">
        <div class="name">${s.navn || ('Bestilling #'+s.order_id)}</div>
        <div class="addr">${[s.adresse, s.postnr, s.poststed].filter(Boolean).join(", ")}</div>
        ${s.arrival_clock ? `<span class="clock">${s.arrival_clock}</span>` : ''}
        ${s.leveringstid ? `<span class="slot">${s.leveringstid}</span>` : ''}
      </div>
      <div class="stop-eta">
        <span data-eta="${s.order_id}">—</span><small>min</small>
      </div>
      <a class="nav-small" href="${navLink(s.lat, s.lon)}" target="_blank" title="Naviger">🧭</a>
    </div>`;
  }).join('');

  $("stops").innerHTML = depotHtml + stopsHtml;

  document.querySelectorAll(".stop").forEach(el => {
    el.addEventListener("click", e => {
      if (e.target.closest("a")) return;
      const m = stopMarkers[el.dataset.id];
      if (m) map.setView(m.getLatLng(), 15);
    });
  });

  const all = [
    [data.depot.lat, data.depot.lon],
    ...stops.map(s => [s.lat, s.lon]),
  ];
  map.fitBounds(L.latLngBounds(all), {padding:[30,30]});

  updateVehicle(data.vehicle);
  if (livePollTimer) clearInterval(livePollTimer);
  livePollTimer = setInterval(pollLive, 30000);
  pollLive();
}

function updateVehicle(v){
  if (!v) {
    if (vehicleMarker){ map.removeLayer(vehicleMarker); vehicleMarker = null; }
    return;
  }
  const latlng = [v.lat, v.lon];
  if (!vehicleMarker) {
    vehicleMarker = L.marker(latlng, {icon: makeVehicleIcon(), zIndexOffset:1000}).addTo(map);
  } else {
    vehicleMarker.setLatLng(latlng);
  }
}

async function pollLive(){
  if (!currentRoute) return;
  // Live-ETA gir bare mening for dagens dato — hvis sjåfør ser fremover/bakover,
  // hopper vi over live-polling (ETA-feltene står som "—")
  if (activeDate !== today()) return;
  try {
    const r = await fetch(`/api/driver/route/live?date=${activeDate}&pin=${encodeURIComponent(getPin())}`);
    if (r.status === 401) { clearPin(); showPinScreen("Sesjonen utløp."); return; }
    if (!r.ok) return;
    const data = await r.json();
    updateVehicle(data.vehicle);
    for (const [orderId, eta] of Object.entries(data.eta_by_order || {})) {
      const el = document.querySelector(`[data-eta="${orderId}"]`);
      if (el) el.textContent = eta.minutes ?? "—";
    }
    // Oppdater "neste stopp"-ETA også
    const next = currentRoute.stops?.[0];
    if (next && data.eta_by_order?.[next.order_id]) {
      const el = document.querySelector("[data-next-eta]");
      if (el) el.textContent = data.eta_by_order[next.order_id].minutes ?? "—";
    }
  } catch(e) {}
}

async function handleLogin(){
  const pin = $("pin").value.trim();
  if (!pin) return;
  $("pinErr").textContent = "";
  $("pinBtn").disabled = true;
  $("pinBtn").textContent = "Sjekker …";
  const ok = await tryAuth(pin);
  $("pinBtn").disabled = false;
  $("pinBtn").textContent = "Logg inn";
  if (!ok) { $("pinErr").textContent = "Feil PIN. Prøv igjen."; $("pin").value = ""; return; }
  setPin(pin);
  showApp();
}

window.addEventListener("DOMContentLoaded", async () => {
  $("pinBtn").addEventListener("click", handleLogin);
  $("pin").addEventListener("keydown", e => { if (e.key === "Enter") handleLogin(); });
  // Hindre alt som ikke er siffer + auto-submit ved 4 siffer
  $("pin").addEventListener("input", e => {
    const cleaned = e.target.value.replace(/\D/g, "").slice(0, 4);
    if (cleaned !== e.target.value) e.target.value = cleaned;
    if (cleaned.length === 4) handleLogin();
  });
  $("refreshBtn").addEventListener("click", () => loadRoute());
  $("logoutBtn").addEventListener("click", () => {
    if (!confirm("Logge ut?")) return;
    clearPin();
    showPinScreen("");
  });
  $("datePrev").addEventListener("click", () => shiftDate(-1));
  $("dateNext").addEventListener("click", () => shiftDate(1));
  updateDateLabel();

  // Auto-login hvis PIN finnes
  const saved = getPin();
  if (saved) {
    if (await tryAuth(saved)) { showApp(); return; }
    clearPin();
  }
  showPinScreen("");
});
</script>
