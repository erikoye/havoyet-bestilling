<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>Sjåfør — Havøyet</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="">
  <style>
    /* Palett synkronisert med admin.html */
    :root{--primary:#0d9488;--primary-dk:#0f766e;--bg:#f1f5f9;--dark:#0f172a;
          --surface:#ffffff;--border:#e2e8f0;--muted:#64748b;
          --ok:#22c55e;--err:#ef4444;
          /* Aliaser så resten av CSS-en under fortsatt funker */
          --blue:#0f172a;--gold:#0d9488;--ink:#0f172a;--soft:#64748b;--line:#e2e8f0}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,
              "Segoe UI",sans-serif;background:var(--bg);color:var(--ink);
              overscroll-behavior:none}

    /* ── PIN-skjerm ──────────────────────────────────────── */
    .pin-screen{position:fixed;inset:0;background:var(--blue);color:#fff;
                display:flex;flex-direction:column;align-items:center;justify-content:center;
                padding:24px;z-index:9999}
    .pin-screen .brand{font-weight:700;font-size:22px;margin-bottom:6px;color:var(--gold)}
    .pin-screen p{color:rgba(255,255,255,.75);margin:0 0 28px;font-size:14px}
    .pin-input{font-size:32px;letter-spacing:18px;width:180px;padding:14px 0 14px 18px;
               text-align:center;background:rgba(255,255,255,.1);color:#fff;
               border:2px solid rgba(255,255,255,.25);border-radius:12px;
               font-family:-apple-system,sans-serif;font-weight:600;
               -webkit-text-security:disc}
    .pin-input:focus{outline:none;border-color:var(--gold);
                     background:rgba(255,255,255,.18)}
    .pin-btn{margin-top:18px;background:var(--gold);color:var(--blue);
             border:none;border-radius:10px;padding:14px 32px;font-size:16px;
             font-weight:700;cursor:pointer;width:200px}
    .pin-err{color:#fca5a5;margin-top:14px;font-size:13px;min-height:18px}

    /* ── Hovedvisning ────────────────────────────────────── */
    .app{display:flex;flex-direction:column;height:100dvh}
    .topbar{background:var(--blue);color:#fff;padding:env(safe-area-inset-top) 14px 12px;
            display:flex;align-items:center;gap:10px;flex-shrink:0;
            padding-top:max(env(safe-area-inset-top),12px)}
    .topbar .brand{font-weight:700;font-size:15px;color:var(--gold);flex:0 0 auto}
    .topbar .summary{font-size:12px;color:rgba(255,255,255,.85);flex:1;
                     line-height:1.4}
    .topbar .summary b{color:#fff;font-size:14px}
    .topbar .menu-btn{background:rgba(255,255,255,.12);border:none;color:#fff;
                      width:36px;height:36px;border-radius:8px;font-size:18px;
                      cursor:pointer}

    /* Datovelger-rad under topbaren — sjåfør kan se i morgen / forrige dag */
    .date-bar{background:var(--blue);color:#fff;padding:0 12px 10px;
              display:flex;align-items:center;gap:8px;flex-shrink:0;
              border-bottom:1px solid rgba(255,255,255,.08)}
    .date-bar .date-btn{background:rgba(255,255,255,.12);border:none;color:#fff;
                        width:36px;height:36px;border-radius:8px;font-size:18px;
                        cursor:pointer;flex-shrink:0}
    .date-bar .date-label{flex:1;text-align:center;font-size:14px;font-weight:600;
                          font-variant-numeric:tabular-nums}
    .date-bar .date-label small{display:block;font-size:11px;color:rgba(255,255,255,.7);
                                font-weight:500;margin-top:1px;text-transform:uppercase;
                                letter-spacing:.5px}

    /* Godkjenningsbanner — tydelig markert som forhåndsvisning */
    .approval-banner{background:#fef3c7;color:#854d0e;border-bottom:2px solid #ca8a04;
                     padding:10px 14px;display:flex;align-items:center;gap:10px;
                     font-size:13px;line-height:1.4;flex-shrink:0}
    .approval-banner .icon{font-size:20px;flex-shrink:0}
    .approval-banner b{display:block;font-size:13px}
    .approval-banner small{display:block;font-size:11px;color:#92400e;margin-top:1px}

    #map-wrap{position:relative;flex:0 0 32vh;width:100%}
    @media (min-height:800px){ #map-wrap{flex-basis:36vh} }
    #map{height:100%;width:100%;background:#e8edf2}
    /* Modernisert Leaflet-styling */
    .leaflet-control-zoom{border:none !important;box-shadow:0 4px 14px rgba(15,23,42,.18) !important;
                          border-radius:10px !important;overflow:hidden;margin:12px !important}
    .leaflet-control-zoom a{background:rgba(255,255,255,.96) !important;color:var(--dark) !important;
                            border:none !important;font-weight:600 !important;width:36px !important;
                            height:36px !important;line-height:36px !important;font-size:18px !important}
    .leaflet-control-zoom a:hover{background:#fff !important;color:var(--primary) !important}
    .leaflet-control-attribution{font-size:9px !important;background:rgba(255,255,255,.7) !important;
                                 padding:1px 6px !important;border-radius:6px !important}
    .map-fab{position:absolute;right:12px;bottom:12px;z-index:400;background:var(--primary);
             color:#fff;border:none;border-radius:50%;width:44px;height:44px;font-size:18px;
             box-shadow:0 6px 18px rgba(13,148,136,.4);cursor:pointer;display:flex;
             align-items:center;justify-content:center}
    .map-fab:active{transform:scale(.92)}
    /* Marker-stil */
    .hv-stop{
      background:#fff;color:var(--dark);width:34px;height:34px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;
      border:3px solid var(--dark);box-shadow:0 4px 12px rgba(15,23,42,.28);
      font-variant-numeric:tabular-nums;font-family:inherit;
    }
    .hv-stop.next{
      background:var(--primary);color:#fff;border-color:#fff;width:42px;height:42px;font-size:16px;
      box-shadow:0 0 0 6px rgba(13,148,136,.22), 0 6px 16px rgba(13,148,136,.45);
      animation:hvNextPulse 1.8s ease-in-out infinite;
    }
    .hv-stop.done{background:var(--ok);color:#fff;border-color:#fff;opacity:.85}
    .hv-stop.last{background:var(--dark);color:var(--gold);border-color:var(--gold)}
    @keyframes hvNextPulse{
      50%{box-shadow:0 0 0 14px rgba(13,148,136,0), 0 6px 16px rgba(13,148,136,.45)}
    }
    .hv-depot{
      background:var(--dark);color:var(--gold);width:38px;height:38px;border-radius:10px;
      display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;
      border:3px solid #fff;box-shadow:0 4px 14px rgba(15,23,42,.4);font-family:inherit;
    }
    .hv-vehicle{
      background:var(--gold);width:22px;height:22px;border-radius:50%;border:3px solid #fff;
      box-shadow:0 0 0 6px rgba(200,164,92,.28);animation:hvVeh 1.6s ease-in-out infinite;
    }
    @keyframes hvVeh{50%{box-shadow:0 0 0 14px rgba(200,164,92,0)}}
    /* Animert polyline (dash-flow) */
    @keyframes hvDash{to{stroke-dashoffset:-30}}
    .hv-route-path{stroke-dasharray:6 6;animation:hvDash 1.4s linear infinite}
    /* Moderne tooltip-stil */
    .hv-stop-tip{background:var(--dark) !important;color:#fff !important;border:none !important;
                 padding:5px 10px !important;border-radius:8px !important;font-size:12px !important;
                 box-shadow:0 4px 12px rgba(15,23,42,.3) !important;font-family:inherit !important}
    .hv-stop-tip::before{border-top-color:var(--dark) !important}

    .stops-panel{flex:1;overflow-y:auto;padding:14px 14px 24px;
                 padding-bottom:max(env(safe-area-inset-bottom),24px)}

    /* "Neste stopp"-kort — primær fokus, alltid på toppen */
    .next-card{background:linear-gradient(135deg,var(--dark),#1e293b);color:#fff;
               border-radius:18px;padding:18px;margin-bottom:18px;
               box-shadow:0 10px 28px rgba(15,23,42,.22)}
    .next-card .label{color:var(--gold);font-size:11px;letter-spacing:1px;
                      text-transform:uppercase;font-weight:700}
    .next-card .name{font-size:22px;font-weight:700;margin:6px 0 4px;line-height:1.15}
    .next-card .addr{font-size:13px;color:rgba(255,255,255,.85);line-height:1.4}
    .next-card .meta{display:flex;gap:18px;margin-top:14px;font-size:13px;
                     color:rgba(255,255,255,.95)}
    .next-card .meta>div{flex:1;min-width:0}
    .next-card .meta .lbl{opacity:.65;font-size:10px;text-transform:uppercase;
                          letter-spacing:.6px;font-weight:600}
    .next-card .meta .val{font-weight:700;font-size:20px;color:#fff;
                          font-variant-numeric:tabular-nums;display:block;margin-top:2px}
    .next-card .nav-btn{display:flex;align-items:center;justify-content:center;
                        gap:8px;width:100%;background:var(--gold);color:var(--blue);
                        border:none;border-radius:12px;padding:16px;font-weight:700;
                        font-size:16px;margin-top:16px;cursor:pointer;
                        text-decoration:none;letter-spacing:.2px}
    .next-card .nav-btn:active{transform:scale(.98);filter:brightness(.94)}

    /* ── Vertikal timeline med klokkeslett-skinne ─────────────────── */
    .timeline{position:relative;padding-left:64px}
    .timeline::before{
      content:"";position:absolute;left:62px;top:14px;bottom:14px;width:2px;
      background:linear-gradient(180deg,var(--gold) 0%,var(--primary) 60%,var(--line) 100%);
      border-radius:2px;
    }
    /* Alle timeline-elementer plasseres med klokkeslett-felt + dot på rad-aksen */
    .tl{position:relative;margin-bottom:14px;display:block}
    .tl::before{
      /* Klokkeslett-tekst */
      content:attr(data-time);
      position:absolute;left:-64px;top:14px;width:50px;text-align:right;
      font-weight:700;font-variant-numeric:tabular-nums;font-size:15px;
      color:var(--ink);letter-spacing:-.2px;
    }
    .tl::after{
      /* Sirkel-prikk på skinnen */
      content:"";position:absolute;left:-7px;top:18px;width:14px;height:14px;
      border-radius:50%;background:#fff;border:3px solid var(--primary);
      box-shadow:0 0 0 3px rgba(13,148,136,.12);box-sizing:border-box;
    }
    .tl.tl-depot::after{background:var(--gold);border-color:var(--dark);
                       box-shadow:0 0 0 3px rgba(13,148,136,.0)}
    .tl.tl-break::after{background:#fef3c7;border-color:#ca8a04;
                       box-shadow:0 0 0 3px rgba(202,138,4,.12)}
    .tl.tl-past::after{background:var(--ok);border-color:var(--ok)}
    .tl.tl-end::after{background:var(--dark);border-color:var(--dark)}
    .tl.tl-next::after{
      width:18px;height:18px;left:-9px;top:16px;
      box-shadow:0 0 0 4px rgba(13,148,136,.25);
      animation:nextPulse 1.8s ease-in-out infinite;
    }
    @keyframes nextPulse{
      50%{box-shadow:0 0 0 10px rgba(13,148,136,0)}
    }

    /* Innholds-kort for hvert event */
    .tl-card{background:#fff;border:1px solid var(--line);border-radius:14px;
             padding:12px 14px;box-shadow:0 1px 2px rgba(15,23,42,.04);
             transition:border-color .15s,transform .15s}
    .tl-card:active{transform:scale(.99)}
    .tl-card .head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
    .tl-card .name{font-weight:700;font-size:15px;color:var(--ink);line-height:1.3}
    .tl-card .addr{font-size:12px;color:var(--soft);line-height:1.35;margin-top:3px}
    .tl-card .badges{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
    .tl-card .badge{font-size:11px;font-weight:600;padding:3px 8px;border-radius:999px;
                    background:var(--bg);color:var(--soft);font-variant-numeric:tabular-nums}
    .tl-card .badge.slot{background:rgba(13,148,136,.1);color:var(--primary-dk)}
    .tl-card .badge.live{background:rgba(13,148,136,.18);color:var(--primary-dk);font-weight:700}
    .tl-card .badge.last{background:var(--dark);color:#fff}
    .tl-card .actions{display:flex;flex-direction:column;gap:6px;flex-shrink:0}
    .tl-card .nav-btn{background:var(--primary);color:#fff;border:none;
                      border-radius:10px;padding:8px 10px;font-size:18px;cursor:pointer;
                      text-decoration:none;line-height:1;display:flex;align-items:center;
                      justify-content:center;min-width:42px;min-height:38px}
    .tl-card .nav-btn:active{filter:brightness(.92)}
    .tl-card .pass-btn{background:#fff;color:var(--ok);border:1.5px solid var(--ok);
                       border-radius:10px;padding:6px 10px;font-size:11.5px;cursor:pointer;
                       font-weight:700;text-transform:uppercase;letter-spacing:.4px;
                       line-height:1;display:flex;align-items:center;justify-content:center;
                       min-width:42px;min-height:34px;font-family:inherit;gap:4px}
    .tl-card .pass-btn:active{background:var(--ok);color:#fff;transform:scale(.96)}

    /* Toggle for å vise passerte stopp */
    .passed-toggle{display:flex;align-items:center;justify-content:center;gap:6px;
                   margin:14px 0 4px;padding:8px 14px;background:#fff;
                   border:1px dashed var(--line);border-radius:10px;color:var(--soft);
                   font-size:12px;cursor:pointer;font-family:inherit;font-weight:600;
                   width:100%}
    .passed-toggle:hover{border-color:var(--ok);color:var(--ok)}

    /* Undo-knapp for passert stopp */
    .tl-card .undo-btn{background:#fff;color:var(--soft);border:1px solid var(--line);
                       border-radius:10px;padding:6px 10px;font-size:11px;cursor:pointer;
                       font-weight:600;font-family:inherit;line-height:1}

    /* Variant: depot (start fra butikken) — kompakt mørkt kort */
    .tl-depot .tl-card{background:linear-gradient(135deg,var(--dark),#1e293b);
                       color:#fff;border:none;padding:12px 14px}
    .tl-depot .tl-card .name{color:#fff;font-size:14px}
    .tl-depot .tl-card .addr{color:rgba(255,255,255,.7)}
    .tl-depot::before{color:var(--gold)}

    /* Variant: pause — diskret gult kort */
    .tl-break .tl-card{background:#fffbeb;border-color:#fde68a;padding:10px 14px}
    .tl-break .tl-card .name{color:#854d0e;font-size:13px;font-weight:600}
    .tl-break .tl-card .name b{font-variant-numeric:tabular-nums}
    .tl-break::before{color:#854d0e;font-size:13px}

    /* Variant: avsluttet — gråtonet */
    .tl-past .tl-card{opacity:.55}
    .tl-past::before{color:var(--soft)}

    /* Variant: aktivt neste stopp — solid kant */
    .tl-next .tl-card{border-color:var(--primary);border-width:2px;
                      box-shadow:0 4px 14px rgba(13,148,136,.18)}

    /* Slutt-rad — total ferdig-tid */
    .tl-end .tl-card{background:#f1f5f9;border-color:var(--line);padding:10px 14px}
    .tl-end .tl-card .name{font-size:13px;color:var(--soft);font-weight:600}

    .empty{text-align:center;padding:48px 18px;color:var(--soft);font-size:14px}
    .pulse-dot{display:inline-block;width:7px;height:7px;border-radius:50%;
               background:var(--ok);margin-right:4px;animation:p 1.4s ease-in-out infinite}
    @keyframes p{50%{opacity:.35}}

    /* ── Sjekkliste-kort (inline i nextCard-slot) ───────────────────
       Sjåfør ser kart + timeline, men den grønne "Neste stopp"-boksen er
       erstattet av denne sjekklisten inntil alle varelinjer er huket av.
       Når sjekklisten er ferdig (eller bekreftet for tom dag), erstattes
       kortet av den vanlige Naviger-CTA. */
    .cl-wrap{background:linear-gradient(135deg,var(--dark),#1e293b);color:#fff;
             border-radius:18px;padding:16px 14px 14px;margin-bottom:18px;
             box-shadow:0 10px 28px rgba(15,23,42,.22)}
    .cl-wrap .cl-head{display:flex;align-items:flex-start;gap:10px;margin-bottom:12px}
    .cl-wrap .cl-head .icon{font-size:22px;flex-shrink:0;line-height:1}
    .cl-wrap .cl-head .meta{flex:1;min-width:0}
    .cl-wrap .cl-head .label{color:var(--gold);font-size:11px;letter-spacing:1px;
                             text-transform:uppercase;font-weight:700}
    .cl-wrap .cl-head .title{font-size:17px;font-weight:700;line-height:1.25;margin-top:2px}
    .cl-wrap .cl-head .sub{font-size:12px;color:rgba(255,255,255,.7);margin-top:3px;line-height:1.4}
    .cl-progress{margin-bottom:12px}
    .cl-progress-bar{height:7px;background:rgba(255,255,255,.14);border-radius:99px;overflow:hidden}
    .cl-progress-fill{height:100%;background:var(--gold);border-radius:99px;
                      width:0%;transition:width .25s ease}
    .cl-progress-text{font-size:11.5px;color:rgba(255,255,255,.78);margin-top:5px;
                      font-variant-numeric:tabular-nums}
    .cl-progress-text b{color:#fff}

    .cl-stops-list{background:#fff;color:var(--ink);border-radius:12px;overflow:hidden;
                   margin-bottom:12px;max-height:42vh;overflow-y:auto;
                   -webkit-overflow-scrolling:touch}

    .cl-card{background:#fff;border-bottom:1px solid var(--line)}
    .cl-card:last-child{border-bottom:none}
    .cl-card.done{background:#f0fdf4}
    .cl-card.done .cl-card-head{background:rgba(34,197,94,.06)}

    .cl-card-head{padding:12px 14px;display:flex;align-items:flex-start;gap:10px;
                  border-bottom:1px solid var(--line)}
    .cl-card.done .cl-card-head{border-bottom-color:rgba(34,197,94,.25)}
    .cl-card-head .num{flex:0 0 auto;background:var(--blue);color:#fff;width:30px;height:30px;
                       border-radius:50%;display:flex;align-items:center;justify-content:center;
                       font-weight:700;font-size:13px;font-variant-numeric:tabular-nums}
    .cl-card.done .cl-card-head .num{background:var(--ok)}
    .cl-card-head .info{flex:1;min-width:0}
    .cl-card-head .name{font-weight:700;font-size:14.5px;color:var(--ink);
                        line-height:1.25}
    .cl-card-head .addr{font-size:12px;color:var(--soft);margin-top:2px;line-height:1.35}
    .cl-card-head .slot-tag{display:inline-block;font-size:11px;font-weight:600;
                            padding:2px 8px;border-radius:999px;
                            background:rgba(13,148,136,.12);color:var(--primary-dk);
                            margin-top:5px}
    .cl-mark-all{flex:0 0 auto;background:#fff;color:var(--primary);
                 border:1.5px solid var(--primary);border-radius:9px;
                 padding:7px 11px;font-size:11.5px;font-weight:700;cursor:pointer;
                 font-family:inherit;line-height:1;text-transform:uppercase;
                 letter-spacing:.3px;white-space:nowrap}
    .cl-mark-all:active{background:var(--primary);color:#fff;transform:scale(.96)}
    .cl-card.done .cl-mark-all{background:transparent;color:var(--ok);
                               border-color:var(--ok)}

    .cl-line{padding:11px 14px;display:flex;align-items:center;gap:12px;
             border-bottom:1px solid var(--line);cursor:pointer;
             transition:background .12s}
    .cl-line:last-child{border-bottom:none}
    .cl-line:active{background:var(--bg)}
    .cl-line.checked{background:rgba(34,197,94,.06)}
    .cl-line.checked .cl-line-name{color:var(--soft);text-decoration:line-through;
                                    text-decoration-color:rgba(100,116,139,.5)}
    .cl-checkbox{flex:0 0 auto;width:24px;height:24px;border:2px solid var(--line);
                 border-radius:7px;background:#fff;display:flex;align-items:center;
                 justify-content:center;font-size:14px;color:#fff;
                 transition:background .15s,border-color .15s}
    .cl-line.checked .cl-checkbox{background:var(--ok);border-color:var(--ok)}
    .cl-line-text{flex:1;min-width:0}
    .cl-line-name{font-weight:600;font-size:14px;color:var(--ink);line-height:1.3}
    .cl-line-name .qty{color:var(--primary-dk);margin-right:6px;
                       font-variant-numeric:tabular-nums}
    .cl-line-variant{font-size:11.5px;color:var(--soft);margin-top:2px;line-height:1.35}
    .cl-card .cl-empty-items{padding:12px 14px;font-size:12px;color:var(--soft);
                             font-style:italic;line-height:1.4}

    .cl-start{width:100%;background:var(--gold);color:var(--blue);border:none;
              border-radius:12px;padding:14px;font-size:15.5px;font-weight:700;
              cursor:pointer;font-family:inherit;letter-spacing:.2px;
              display:flex;align-items:center;justify-content:center;gap:8px;
              transition:opacity .15s}
    .cl-start:disabled{background:rgba(255,255,255,.15);color:rgba(255,255,255,.55);
                       cursor:not-allowed}
    .cl-start:not(:disabled):active{filter:brightness(.94);transform:scale(.99)}
    .cl-start-hint{font-size:11px;color:rgba(255,255,255,.6);text-align:center;
                   margin-top:8px;line-height:1.4}
  </style>
</head>
<body>

<!-- PIN-skjerm -->
<div class="pin-screen" id="pinScreen" style="display:none">
  <div class="brand">Havøyet</div>
  <p>Skriv inn sjåfør-PIN for å starte</p>
  <input type="tel" inputmode="numeric" pattern="[0-9]*" class="pin-input" id="pin"
         maxlength="4" autocomplete="one-time-code" autofocus>
  <button class="pin-btn" id="pinBtn">Logg inn</button>
  <div class="pin-err" id="pinErr"></div>
</div>

<!-- Hovedvisning -->
<div class="app" id="app" style="display:none">
  <div class="topbar">
    <span class="brand">Havøyet</span>
    <div class="summary" id="summary">Laster …</div>
    <button class="menu-btn" id="refreshBtn" title="Last på nytt">⟳</button>
    <button class="menu-btn" id="calBtn" title="Legg dagens rute i kalenderen" aria-label="Legg rute i kalender">📅</button>
    <button class="menu-btn" id="logoutBtn" title="Logg ut">⏻</button>
  </div>
  <div class="date-bar">
    <button class="date-btn" id="datePrev" aria-label="Forrige dag">‹</button>
    <div class="date-label" id="dateLabel">—</div>
    <button class="date-btn" id="dateNext" aria-label="Neste dag">›</button>
  </div>
  <div id="approvalBanner" style="display:none"></div>
  <div id="map-wrap">
    <div id="map"></div>
    <button class="map-fab" id="recenterBtn" title="Sentrer kart" aria-label="Sentrer kart">⤢</button>
  </div>
  <div class="stops-panel">
    <div id="nextCard"></div>
    <div id="stops"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>
<script>
const $ = id => document.getElementById(id);
const PIN_KEY = "havoyet_driver_pin";
const today = () => new Date().toISOString().slice(0,10);
// Aktiv dato — kan endres med pil-knappene i topbaren
let activeDate = today();

function _isoToDate(iso) {
  const [y, m, d] = String(iso).split('-').map(Number);
  return new Date(y, (m||1)-1, d||1);
}
function _dateToIso(dt) {
  const yy = dt.getFullYear();
  const mm = String(dt.getMonth() + 1).padStart(2, '0');
  const dd = String(dt.getDate()).padStart(2, '0');
  return `${yy}-${mm}-${dd}`;
}
function _humanDate(iso) {
  const dt = _isoToDate(iso);
  const t = _isoToDate(today());
  const diff = Math.round((dt - t) / (1000 * 60 * 60 * 24));
  const weekday = dt.toLocaleDateString('nb-NO', { weekday: 'long' });
  const pretty = `${weekday.charAt(0).toUpperCase()}${weekday.slice(1)} ${dt.getDate()}.${String(dt.getMonth()+1).padStart(2,'0')}`;
  let rel = '';
  if (diff === 0) rel = 'I dag';
  else if (diff === 1) rel = 'I morgen';
  else if (diff === -1) rel = 'I går';
  else if (diff > 1) rel = `Om ${diff} dager`;
  else rel = `${Math.abs(diff)} dager siden`;
  return { pretty, rel };
}
function updateDateLabel() {
  const { pretty, rel } = _humanDate(activeDate);
  $("dateLabel").innerHTML = `${pretty}<small>${rel}</small>`;
}
function shiftDate(delta) {
  const dt = _isoToDate(activeDate);
  dt.setDate(dt.getDate() + delta);
  activeDate = _dateToIso(dt);
  updateDateLabel();
  // Hver dag har egen sjekkliste-state — re-fetcher rute + checklist
  loadRoute();
}

let map, vehicleMarker, routeLine;
const stopLayer = (typeof L !== "undefined") ? L.layerGroup() : null;
const stopMarkers = {};
let currentRoute = null;
let livePollTimer = null;
// Pause polling når sjåføren låser telefonen eller bytter app
document.addEventListener('visibilitychange', () => {
  if (document.hidden && livePollTimer) {
    clearInterval(livePollTimer);
    livePollTimer = null;
  } else if (!document.hidden && currentRoute && !livePollTimer) {
    livePollTimer = setInterval(pollLive, 30000);
    pollLive();
  }
});

function getPin(){ return localStorage.getItem(PIN_KEY) || ""; }
function setPin(v){ localStorage.setItem(PIN_KEY, v); }
function clearPin(){ localStorage.removeItem(PIN_KEY); }

async function tryAuth(pin){
  const r = await fetch("/api/driver/auth", {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({pin}),
  });
  return r.ok;
}

async function showPinScreen(msg){
  $("app").style.display = "none";
  $("pinScreen").style.display = "flex";
  if (msg) $("pinErr").textContent = msg;
  setTimeout(() => $("pin").focus(), 100);
}

// Driver-app: kart + timeline er alltid synlig. Sjekkliste rendres inline i
// nextCard-slot (der den grønne Neste-stopp-boksen ellers står) inntil
// sjåføren har huket av alle varelinjer.
async function showApp(){
  $("pinScreen").style.display = "none";
  $("app").style.display = "flex";
  if (!map) initMap();
  await loadRoute();
}

function initMap(){
  map = L.map("map", {
    zoomControl: true,
    attributionControl: true,
    tap: true,
    // Litt klemt zoom for mobil — gjør pan/zoom mer behagelig
    minZoom: 9,
    maxZoom: 18,
  }).setView([60.39, 5.32], 11);
  // CartoDB Voyager — moderne, ren, lyst kartdesign (gratis, krever ingen API-key)
  L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png", {
    attribution: '&copy; OSM &copy; CARTO',
    subdomains: 'abcd',
    maxZoom: 19,
  }).addTo(map);
  stopLayer.addTo(map);
}

function makeStopIcon(num, opts){
  const cls = ["hv-stop", opts?.next ? "next" : "", opts?.done ? "done" : "", opts?.last ? "last" : ""]
    .filter(Boolean).join(" ");
  const size = opts?.next ? 42 : 34;
  return L.divIcon({
    className: "",
    html: `<div class="${cls}">${num}</div>`,
    iconSize:[size,size], iconAnchor:[size/2,size/2],
  });
}
function makeVehicleIcon(){
  return L.divIcon({
    className: "",
    html: `<div class="hv-vehicle"></div>`,
    iconSize:[22,22], iconAnchor:[11,11],
  });
}
function makeDepotIcon(){
  return L.divIcon({
    className: "",
    html: `<div class="hv-depot">⌂</div>`,
    iconSize:[38,38], iconAnchor:[19,19],
  });
}

function navLink(lat, lon, label){
  // Apple Maps universal, fallback til Google Maps på Android
  const isApple = /iPhone|iPad|iPod|Mac/.test(navigator.platform);
  if (isApple) return `maps://?daddr=${lat},${lon}&dirflg=d`;
  return `https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}&travelmode=driving`;
}

async function markPassed(orderId, passed, btn){
  if (btn) { btn.disabled = true; const prev = btn.textContent; btn.dataset.prev = prev; btn.textContent = passed ? 'Lagrer…' : 'Angrer…'; }
  try {
    const r = await fetch(`/api/driver/route/mark-passed?pin=${encodeURIComponent(getPin())}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ date: activeDate, order_id: String(orderId), passed }),
    });
    if (r.status === 401) { clearPin(); showPinScreen("Sesjonen utløp."); return; }
    if (!r.ok) {
      const v = await r.json().catch(() => ({}));
      alert("Klarte ikke å lagre: " + (v.error || r.status));
      if (btn) { btn.disabled = false; btn.textContent = btn.dataset.prev || ''; }
      return;
    }
    await loadRoute();
  } catch(e) {
    alert("Feilet: " + (e.message || e));
    if (btn) { btn.disabled = false; btn.textContent = btn.dataset.prev || ''; }
  }
}

function togglePassed(){
  const sec = document.getElementById('passedSection');
  const btn = document.getElementById('passedToggle');
  if (!sec || !btn) return;
  const expanded = btn.dataset.expanded === 'true';
  const n = (currentRoute && Array.isArray(currentRoute.passed_stops))
    ? currentRoute.passed_stops.length : 0;
  const plural = n === 1 ? '' : 'e';
  if (expanded) {
    sec.style.display = 'none';
    btn.dataset.expanded = 'false';
    btn.textContent = `✓ Vis ${n} levert${plural} stopp`;
  } else {
    sec.style.display = '';
    btn.dataset.expanded = 'true';
    btn.textContent = `Skjul ${n} levert${plural} stopp`;
  }
}

async function fetchRoute(){
  const r = await fetch(`/api/driver/route/today?date=${activeDate}&pin=${encodeURIComponent(getPin())}`);
  if (r.status === 401) { clearPin(); showPinScreen("Sesjonen utløp. Logg inn på nytt."); return null; }
  if (!r.ok) return null;
  return r.json();
}

function renderApprovalBanner(data){
  const box = $("approvalBanner");
  if (!data || data.error === "no_depot" || !(data.stops || []).length) {
    box.style.display = "none";
    return;
  }
  if (data.awaiting_approval) {
    box.innerHTML = `
      <div class="approval-banner">
        <div class="icon">⚠️</div>
        <div>
          <b>Forhåndsvisning — ikke godkjent</b>
          <small>Admin må godkjenne ruten før den er offisiell. Du ser den planlagte ruten her, men kunder har ikke fått SMS ennå.</small>
        </div>
      </div>`;
    box.style.display = "block";
  } else {
    box.style.display = "none";
  }
}

async function loadRoute(){
  $("summary").textContent = "Laster …";
  $("stops").innerHTML = "";
  $("nextCard").innerHTML = "";
  $("approvalBanner").style.display = "none";
  stopLayer.clearLayers();
  if (routeLine) { map.removeLayer(routeLine); routeLine = null; }

  // Hent rute + sjekkliste-state parallelt — vi trenger begge for å avgjøre
  // om nextCard skal vise sjekklisten eller Naviger-CTA.
  const [data, checklist] = await Promise.all([
    fetchRoute(),
    fetchChecklist(activeDate),
  ]);
  if (!data) return;
  currentChecklist = checklist || {};
  await renderRoute(data);
}

// DOM-rendering av ruten (kart, timeline, neste-stopp/sjekkliste-boks).
// Splittet ut fra loadRoute() så _renderNextCard() kan gjenbruke cached data
// uten å fetche på nytt når sjåføren krysser av i sjekklisten.
async function renderRoute(data){
  // Idempotent: nullstill DOM/lag før vi tegner. loadRoute gjør dette tidlig
  // for å vise 'Laster…', men når vi rendrer fra cached data direkte må vi
  // rense her også.
  $("stops").innerHTML = "";
  $("nextCard").innerHTML = "";
  $("approvalBanner").style.display = "none";
  if (stopLayer) stopLayer.clearLayers();
  if (routeLine && map) { map.removeLayer(routeLine); routeLine = null; }

  currentRoute = data;

  if (data.error === "no_depot") {
    $("summary").innerHTML = "Depot ikke konfigurert";
    return;
  }

  renderApprovalBanner(data);

  const stops = data.stops || [];
  if (!stops.length) {
    const label = data.awaiting_approval ? "Ingen ordrer denne dagen" : "Ingen leveringer i dag";
    $("summary").innerHTML = label;
    $("stops").innerHTML = `<div class="empty">Ingen ordrer med leveringsdato ${data.date}.</div>`;
    return;
  }

  const startClock = data.start_clock || "—";
  const statusPill = data.awaiting_approval
    ? '<span style="color:#fbbf24">● Ikke godkjent</span>'
    : '<span style="color:#22c55e">● Godkjent</span>';
  $("summary").innerHTML = `<b>${stops.length}</b> stopp · start <b>${startClock}</b><br>${statusPill}
    ${data.vehicle ? ' · <span class="pulse-dot"></span>Bil online' : ''}`;

  // Depot-markør (lat depotMarker leve på map, ikke stopLayer som tømmes)
  if (data.depot) {
    if (window._hvDepotMarker) map.removeLayer(window._hvDepotMarker);
    window._hvDepotMarker = L.marker([data.depot.lat, data.depot.lon], {icon: makeDepotIcon()})
      .addTo(map);
  }

  if (data.geometry?.coordinates && data.geometry.coordinates.length > 1) {
    const latlngs = data.geometry.coordinates.map(([lon,lat]) => [lat,lon]);
    routeLine = L.polyline(latlngs, {
      color: "#0d9488", weight: 5, opacity: .85,
      lineCap: "round", lineJoin: "round",
    }).addTo(map);
  } else if (data.depot) {
    // Fallback animert rett-linje gjennom depot + stopp
    const fallback = [[data.depot.lat, data.depot.lon]]
      .concat(stops.filter(s => s.lat != null && s.lon != null).map(s => [s.lat, s.lon]));
    if (fallback.length > 1) {
      routeLine = L.polyline(fallback, {
        color: "#0d9488", weight: 4, opacity: .75,
        lineCap: "round", lineJoin: "round",
        className: "hv-route-path",
      }).addTo(map);
    }
  }

  // Beregn "nå" for å markere passerte stopp
  const _nowMin = (activeDate === today())
    ? new Date().getHours() * 60 + new Date().getMinutes()
    : null;
  const _ckToMin = (hhmm) => {
    const m = String(hhmm || '').match(/^(\d{1,2}):(\d{2})$/);
    return m ? parseInt(m[1],10)*60 + parseInt(m[2],10) : null;
  };

  stops.forEach((s, i) => {
    const stopMin = _ckToMin(s.arrival_clock);
    const past = _nowMin != null && stopMin != null && stopMin + 5 < _nowMin;
    const isNext = i === 0 && !past;
    const isLast = i === stops.length - 1;
    const m = L.marker([s.lat, s.lon], {
      icon: makeStopIcon(s.stop_index, { next: isNext, done: past, last: isLast }),
      zIndexOffset: isNext ? 500 : (past ? 100 : 300),
    }).addTo(stopLayer);
    if (s.arrival_clock) {
      m.bindTooltip(`<b>${s.arrival_clock}</b> · #${s.stop_index} ${s.navn || ''}`, {
        direction: 'top', offset: [0, -8], opacity: .95, className: 'hv-stop-tip',
      });
    }
    stopMarkers[s.order_id] = m;
  });

  // Neste stopp = første som ikke er levert
  // (Driver-API returnerer kun ikke-leverte stopp; stops[0] er neste)
  // _renderNextCard avgjør om vi viser sjekklisten eller Naviger-CTA — sjekklisten
  // gates kun den grønne "Neste stopp"-boksen. Kart og timeline er alltid synlig.
  _renderNextCard(data);

  // ── Bygg vertikal timeline ────────────────────────────────────────
  const breaks = Array.isArray(data.breaks) ? data.breaks : [];
  const breaksForAnchor = (anchorId) =>
    breaks.filter(b => String(b.after_order_id) === String(anchorId));

  // "Nå" som minutter siden midnatt — brukes til å markere passerte stopp
  // (bare når sjåføren ser på dagens dato — ellers ingen passert-merking)
  const now = new Date();
  const nowMin = (activeDate === today())
    ? now.getHours() * 60 + now.getMinutes()
    : null;
  const clockToMin = (hhmm) => {
    const m = String(hhmm || '').match(/^(\d{1,2}):(\d{2})$/);
    return m ? parseInt(m[1],10)*60 + parseInt(m[2],10) : null;
  };

  const tlBreaks = (anchorId) => breaksForAnchor(anchorId).map(b => {
    // Pause-rad har ikke eget klokkeslett — vises som relativ "+15 min"
    return `<div class="tl tl-break" data-time="+${b.minutes}m">
      <div class="tl-card">
        <div class="name">☕ Pause <b>${b.minutes} min</b>${b.label ? ` · ${b.label}` : ''}</div>
      </div>
    </div>`;
  }).join('');

  // Depot-rad
  let timelineHtml = `
    <div class="tl tl-depot" data-time="${startClock}">
      <div class="tl-card">
        <div class="head">
          <div>
            <div class="name">Start fra butikken</div>
            <div class="addr">Nesttunvegen 96, 5221 Nesttun</div>
          </div>
        </div>
      </div>
    </div>` + tlBreaks('depot');

  // Stopp-rader
  timelineHtml += stops.map((s, i) => {
    const time = s.arrival_clock || '—';
    const stopMin = clockToMin(time);
    const past = nowMin != null && stopMin != null && stopMin + 5 < nowMin; // 5 min slack
    const isNext = i === 0 && !past;
    const isLast = i === stops.length - 1;
    const cls = ['tl', past ? 'tl-past' : '', isNext ? 'tl-next' : ''].filter(Boolean).join(' ');
    const badges = [
      s.leveringstid ? `<span class="badge slot">${s.leveringstid}</span>` : '',
      `<span class="badge live"><span data-eta="${s.order_id}">—</span> min</span>`,
      isLast ? `<span class="badge last">Siste</span>` : '',
    ].filter(Boolean).join('');
    const breaksAfter = i < stops.length - 1
      ? tlBreaks(String(s.order_id))
      : '';
    return `
      <div class="${cls}" data-time="${time}" data-id="${s.order_id}">
        <div class="tl-card">
          <div class="head">
            <div style="flex:1;min-width:0">
              <div class="name">#${s.stop_index} · ${s.navn || ('Bestilling #'+s.order_id)}</div>
              <div class="addr">${[s.adresse, s.postnr, s.poststed].filter(Boolean).join(", ")}</div>
              <div class="badges">${badges}</div>
            </div>
            <div class="actions">
              <a class="nav-btn" href="${navLink(s.lat, s.lon)}" target="_blank" title="Naviger" aria-label="Naviger til ${(s.navn||'').replace(/"/g,'&quot;')}">🧭</a>
              <button class="pass-btn" data-pass="${s.order_id}" title="Marker som levert — kunde og admin får statusoppdatering">✓ Levert</button>
            </div>
          </div>
        </div>
      </div>${breaksAfter}`;
  }).join('');

  // Slutt-rad: estimert ferdig-tid
  if (stops.length) {
    const lastStop = stops[stops.length - 1];
    const lastMin = clockToMin(lastStop.departure_clock || lastStop.arrival_clock);
    if (lastMin != null) {
      const endH = String(Math.floor(lastMin/60) % 24).padStart(2,'0');
      const endM = String(lastMin % 60).padStart(2,'0');
      timelineHtml += `
        <div class="tl tl-end" data-time="${endH}:${endM}">
          <div class="tl-card">
            <div class="name">Ferdig med ruten</div>
          </div>
        </div>`;
    }
  }

  // Passerte stopp — vises under en collapsable toggle
  const passedStops = Array.isArray(data.passed_stops) ? data.passed_stops : [];
  let passedHtml = '';
  if (passedStops.length) {
    const passedItems = passedStops.map(s => `
      <div class="tl tl-past" data-time="${s.arrival_clock || '—'}" data-id="${s.order_id}">
        <div class="tl-card">
          <div class="head">
            <div style="flex:1;min-width:0">
              <div class="name">#${s.stop_index} · ${s.navn || ('Bestilling #'+s.order_id)}</div>
              <div class="addr">${[s.adresse, s.postnr, s.poststed].filter(Boolean).join(", ")}</div>
            </div>
            <button class="undo-btn" data-unpass="${s.order_id}" title="Angre levert-markering">↶ Angre</button>
          </div>
        </div>
      </div>`).join('');
    passedHtml = `
      <button class="passed-toggle" id="passedToggle" type="button"
              data-expanded="false" onclick="togglePassed()">
        ✓ Vis ${passedStops.length} levert${passedStops.length === 1 ? '' : 'e'} stopp
      </button>
      <div id="passedSection" style="display:none;margin-top:8px;">
        <div class="timeline" style="opacity:.85">${passedItems}</div>
      </div>`;
  }

  $("stops").innerHTML = `<div class="timeline">${timelineHtml}</div>${passedHtml}`;

  document.querySelectorAll(".tl[data-id]").forEach(el => {
    el.addEventListener("click", e => {
      if (e.target.closest("a") || e.target.closest("button")) return;
      const m = stopMarkers[el.dataset.id];
      if (m) { map.setView(m.getLatLng(), 15); m.openPopup && m.openPopup(); }
    });
  });
  document.querySelectorAll("[data-pass]").forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      markPassed(btn.dataset.pass, true, btn);
    });
  });
  document.querySelectorAll("[data-unpass]").forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      markPassed(btn.dataset.unpass, false, btn);
    });
  });

  const all = [
    [data.depot.lat, data.depot.lon],
    ...stops.map(s => [s.lat, s.lon]),
  ];
  map.fitBounds(L.latLngBounds(all), {padding:[30,30]});

  updateVehicle(data.vehicle);
  if (livePollTimer) clearInterval(livePollTimer);
  livePollTimer = setInterval(pollLive, 30000);
  pollLive();
}

function updateVehicle(v){
  if (!v) {
    if (vehicleMarker){ map.removeLayer(vehicleMarker); vehicleMarker = null; }
    return;
  }
  const latlng = [v.lat, v.lon];
  if (!vehicleMarker) {
    vehicleMarker = L.marker(latlng, {icon: makeVehicleIcon(), zIndexOffset:1000}).addTo(map);
  } else {
    vehicleMarker.setLatLng(latlng);
  }
}

async function pollLive(){
  if (!currentRoute) return;
  // Live-ETA gir bare mening for dagens dato — hvis sjåfør ser fremover/bakover,
  // hopper vi over live-polling (ETA-feltene står som "—")
  if (activeDate !== today()) return;
  try {
    const r = await fetch(`/api/driver/route/live?date=${activeDate}&pin=${encodeURIComponent(getPin())}`);
    if (r.status === 401) { clearPin(); showPinScreen("Sesjonen utløp."); return; }
    if (!r.ok) return;
    const data = await r.json();
    updateVehicle(data.vehicle);
    for (const [orderId, eta] of Object.entries(data.eta_by_order || {})) {
      const el = document.querySelector(`[data-eta="${orderId}"]`);
      if (el) el.textContent = eta.minutes ?? "—";
    }
    // Oppdater "neste stopp"-ETA også
    const next = currentRoute.stops?.[0];
    if (next && data.eta_by_order?.[next.order_id]) {
      const el = document.querySelector("[data-next-eta]");
      if (el) el.textContent = data.eta_by_order[next.order_id].minutes ?? "—";
    }
  } catch(e) {}
}

// ─────────────────────────────────────────────────────────────────────
// Sjekkliste (pre-flight): sjåfør må krysse av alle varelinjer før ruten
// vises. State lagres per dato på server så fremgangen overlever reload.
// ─────────────────────────────────────────────────────────────────────
let currentChecklist = {};  // { order_id: [line_id, ...] }

function _countTotalItems(route){
  const stops = (route && route.stops) || [];
  return stops.reduce((sum, s) => sum + ((s.items || []).length), 0);
}
function _countCheckedItems(route, checklist){
  const stops = (route && route.stops) || [];
  let n = 0;
  for (const s of stops) {
    const set = new Set((checklist[s.order_id] || []).map(String));
    for (const it of (s.items || [])) {
      if (set.has(String(it.line_id))) n++;
    }
  }
  return n;
}
function _isChecklistComplete(route, checklist){
  const stops = (route && route.stops) || [];
  for (const s of stops) {
    const items = s.items || [];
    if (!items.length) continue;  // ingen linjer å krysse av → auto-ok
    const set = new Set((checklist[s.order_id] || []).map(String));
    for (const it of items) {
      if (!set.has(String(it.line_id))) return false;
    }
  }
  return true;
}

async function fetchChecklist(date){
  try {
    const r = await fetch(`/api/driver/route/checklist?date=${date}&pin=${encodeURIComponent(getPin())}`);
    if (r.status === 401) { clearPin(); showPinScreen("Sesjonen utløp."); return null; }
    if (!r.ok) return {};
    const data = await r.json();
    return data.checked || {};
  } catch (e) {
    return {};
  }
}

// Lagrer én enkelt linje (eller en bulk-liste når line_ids settes). Optimistisk
// oppdatering på klientsiden — hvis serveren feiler, ruller vi tilbake og varsler.
async function saveChecklistChange(body, optimisticApply, optimisticRollback){
  optimisticApply && optimisticApply();
  try {
    const r = await fetch(`/api/driver/route/checklist?pin=${encodeURIComponent(getPin())}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ date: activeDate, ...body }),
    });
    if (r.status === 401) { clearPin(); showPinScreen("Sesjonen utløp."); return false; }
    if (!r.ok) throw new Error("server " + r.status);
    const data = await r.json();
    // Server er sannhet — synk lokal state hvis vi fikk full checklist tilbake
    if (data.checklist) currentChecklist = data.checklist;
    return true;
  } catch (e) {
    optimisticRollback && optimisticRollback();
    alert("Klarte ikke å lagre avkrysning. Prøv igjen.");
    if (currentRoute) _renderNextCard(currentRoute);
    return false;
  }
}

function _escapeHtml(s){
  return String(s ?? "").replace(/[&<>"']/g, c =>
    ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c]));
}

// Tom-dag ack-flagg per dato. Sjåfør må aktivt trykke "Bekreft og start rute"
// første gang en dag uten varelinjer åpnes — flagget lagres lokalt så
// neste reload samme dag hopper rett til Naviger-CTA.
const _ackKey = (date) => `havoyet_route_ack_${date}`;
function _isDayAcked(date){ return localStorage.getItem(_ackKey(date)) === "1"; }
function _ackDay(date){ localStorage.setItem(_ackKey(date), "1"); }

// Peek-modus: sjåfør har klikket "Vis sjekkliste" fra Naviger-CTA og ser
// listen igjen. Hvis ingenting endres, kan han trykke "Tilbake" for å komme
// tilbake til Naviger. Hvis han fjerner en hake, gates Naviger-CTA på nytt
// inntil alle er huket av igjen. In-memory (reset ved datoskift/reload).
let _peekChecklist = false;

// Renderer enten sjekklisten eller den vanlige Neste-stopp-boksen i #nextCard.
// Kart + timeline er alltid synlig — kun den grønne CTA-boksen gates.
function _renderNextCard(data){
  const stops = data.stops || [];
  if (!stops.length) {
    $("nextCard").innerHTML = "";
    return;
  }
  const next = stops[0];
  const total = _countTotalItems(data);
  const complete = _isChecklistComplete(data, currentChecklist);
  const gateOpen = total > 0 ? complete : _isDayAcked(activeDate);

  // Peek-modus: sjåfør har trykket "Vis sjekkliste" på Naviger-kortet — vis
  // listen igjen selv om alt er huket av, så han kan dobbeltsjekke eller
  // angre en hake. Når gaten lukkes (avhaket linje) eller han trykker
  // "Tilbake til ruten", bytter visningen tilbake.
  if (gateOpen && !_peekChecklist) {
    _renderNextStopCTA(data, next);
  } else {
    _renderChecklistCard(data, stops);
  }
}

function _renderNextStopCTA(data, next){
  const stops = data.stops || [];
  $("nextCard").innerHTML = `
    <div class="next-card">
      <div class="label">Neste stopp · ${next.stop_index} av ${stops.length}${data.awaiting_approval ? ' · FORHÅNDSVISNING' : ''}</div>
      <div class="name">${_escapeHtml(next.navn || ('Bestilling #'+next.order_id))}</div>
      <div class="addr">${_escapeHtml([next.adresse, next.postnr, next.poststed].filter(Boolean).join(", ")) || "(adresse mangler)"}</div>
      <div class="meta">
        ${next.arrival_clock ? `<div><div class="lbl">Planlagt</div><span class="val">${_escapeHtml(next.arrival_clock)}</span></div>` : ""}
        <div><div class="lbl">Live ETA</div><span class="val"><span data-next-eta>—</span> <span style="font-size:13px;opacity:.7">min</span></span></div>
        ${next.leveringstid ? `<div><div class="lbl">Vindu</div><span class="val" style="font-size:14px">${_escapeHtml(next.leveringstid)}</span></div>` : ""}
      </div>
      <a class="nav-btn" href="${navLink(next.lat, next.lon, next.navn)}" target="_blank">
        🧭 Naviger hit
      </a>
      <button class="show-checklist-btn" id="showChecklistBtn" type="button">
        📋 Vis sjekkliste
      </button>
    </div>`;
  document.getElementById("showChecklistBtn")?.addEventListener("click", () => {
    _peekChecklist = true;
    if (currentRoute) _renderNextCard(currentRoute);
  });
}

function _renderChecklistCard(data, stops){
  const total = _countTotalItems(data);
  const done = _countCheckedItems(data, currentChecklist);
  const pct = total ? Math.round((done / total) * 100) : 0;

  const stopsHtml = stops.map(s => {
    const items = s.items || [];
    const checkedSet = new Set((currentChecklist[s.order_id] || []).map(String));
    const stopChecked = items.length > 0 && items.every(it => checkedSet.has(String(it.line_id)));
    const addrLine = [s.adresse, s.postnr, s.poststed].filter(Boolean).join(", ");
    const slotTag = s.leveringstid
      ? `<div class="slot-tag">${_escapeHtml(s.leveringstid)}</div>` : "";
    const markAllLabel = stopChecked ? "Fjern alle" : "Marker alle";

    const linesHtml = items.length
      ? items.map(it => {
          const isChecked = checkedSet.has(String(it.line_id));
          const variant = it.variant ? `<div class="cl-line-variant">${_escapeHtml(it.variant)}</div>` : "";
          const unit = it.unit ? ` ${_escapeHtml(it.unit)}` : "";
          return `
            <div class="cl-line${isChecked ? ' checked' : ''}"
                 data-order="${_escapeHtml(s.order_id)}"
                 data-line="${_escapeHtml(it.line_id)}"
                 role="checkbox" aria-checked="${isChecked}" tabindex="0">
              <div class="cl-checkbox" aria-hidden="true">${isChecked ? '✓' : ''}</div>
              <div class="cl-line-text">
                <div class="cl-line-name"><span class="qty">${_escapeHtml(it.qty)}×${unit}</span>${_escapeHtml(it.name || '(uten navn)')}</div>
                ${variant}
              </div>
            </div>`;
        }).join("")
      : `<div class="cl-empty-items">Ingen varelinjer registrert på denne ordren.</div>`;

    return `
      <div class="cl-card${stopChecked ? ' done' : ''}" data-stop="${_escapeHtml(s.order_id)}">
        <div class="cl-card-head">
          <div class="num">${_escapeHtml(s.stop_index)}</div>
          <div class="info">
            <div class="name">${_escapeHtml(s.navn || ('Bestilling #' + s.order_id))}</div>
            <div class="addr">${_escapeHtml(addrLine || '(adresse mangler)')}</div>
            ${slotTag}
          </div>
          ${items.length ? `<button class="cl-mark-all" type="button"
                                   data-mark-all="${_escapeHtml(s.order_id)}">${markAllLabel}</button>` : ""}
        </div>
        ${linesHtml}
      </div>`;
  }).join("");

  const startEnabled = total > 0 ? _isChecklistComplete(data, currentChecklist) : true;
  // I peek-modus er knapp-teksten "Tilbake til ruten" så lenge gaten er åpen
  // (alle huket av). Hvis sjåfør angrer en hake og det ikke lenger er komplett,
  // faller knappen tilbake til standard "Pakk ferdig først"-tekst.
  const startLabel = _peekChecklist && startEnabled
    ? "← Tilbake til ruten"
    : (total === 0
        ? "Bekreft og start rute"
        : (startEnabled
            ? "✓ Alt er pakket — Start rute"
            : `Pakk ferdig først (${total - done} igjen)`));
  const headTitle = _peekChecklist
    ? "Sjekk eller endre liste"
    : "Pakk ferdig før du starter";
  const headSub = _peekChecklist
    ? "Trykk på en linje for å fjerne haken hvis noe ikke stemmer. Trykk Tilbake når du er ferdig."
    : "Hak av hver vare etter hvert som den legges i bilen. Først når alt er huket av, kommer Naviger-knappen opp.";

  $("nextCard").innerHTML = `
    <div class="cl-wrap">
      <div class="cl-head">
        <div class="icon">${_peekChecklist ? '🔍' : '📦'}</div>
        <div class="meta">
          <div class="label">Sjekkliste · ${_peekChecklist ? 'gjennomgang' : 'før første kunde'}</div>
          <div class="title">${_escapeHtml(headTitle)}</div>
          <div class="sub">${_escapeHtml(headSub)}</div>
        </div>
      </div>
      ${total > 0 ? `
        <div class="cl-progress">
          <div class="cl-progress-bar"><div class="cl-progress-fill" style="width:${pct}%"></div></div>
          <div class="cl-progress-text"><b>${done}</b> av <b>${total}</b> varer pakket</div>
        </div>` : ''}
      <div class="cl-stops-list">${stopsHtml}</div>
      <button class="cl-start" id="clStartBtn" ${startEnabled ? '' : 'disabled'}>${_escapeHtml(startLabel)}</button>
      ${total === 0 && !_peekChecklist
        ? `<div class="cl-start-hint">Ingen varelinjer er registrert på dagens ordrer. Bekreft at alt er klart for utkjøring.</div>`
        : ''}
    </div>`;

  // Linje-toggling
  $("nextCard").querySelectorAll(".cl-line").forEach(el => {
    const toggle = async () => {
      const orderId = el.dataset.order;
      const lineId = el.dataset.line;
      const wasChecked = el.classList.contains("checked");
      const newChecked = !wasChecked;
      const ok = await saveChecklistChange(
        { order_id: orderId, line_id: lineId, checked: newChecked },
        () => {
          const arr = currentChecklist[orderId] ? [...currentChecklist[orderId]] : [];
          if (newChecked && !arr.includes(lineId)) arr.push(lineId);
          if (!newChecked) {
            const i = arr.indexOf(lineId);
            if (i >= 0) arr.splice(i, 1);
          }
          if (arr.length) currentChecklist[orderId] = arr;
          else delete currentChecklist[orderId];
        }
      );
      if (ok) _renderNextCard(currentRoute);
    };
    el.addEventListener("click", toggle);
    el.addEventListener("keydown", e => {
      if (e.key === " " || e.key === "Enter") { e.preventDefault(); toggle(); }
    });
  });

  // Marker-alle-knapp per kunde
  $("nextCard").querySelectorAll("[data-mark-all]").forEach(btn => {
    btn.addEventListener("click", async e => {
      e.stopPropagation();
      const orderId = btn.dataset.markAll;
      const stop = stops.find(s => String(s.order_id) === String(orderId));
      if (!stop) return;
      const items = stop.items || [];
      const allLineIds = items.map(it => String(it.line_id));
      const currentSet = new Set((currentChecklist[orderId] || []).map(String));
      const isAllChecked = allLineIds.every(id => currentSet.has(id));
      const targetChecked = !isAllChecked;
      const ok = await saveChecklistChange(
        { order_id: orderId, line_ids: allLineIds, checked: targetChecked },
        () => {
          if (targetChecked) currentChecklist[orderId] = [...allLineIds];
          else delete currentChecklist[orderId];
        }
      );
      if (ok) _renderNextCard(currentRoute);
    });
  });

  // Start rute-knapp: enten flytter den oss til Naviger-CTA (når sjekkliste er
  // ferdig), eller bekrefter manuelt at en tom-vareliste-dag er klar for kjøring.
  const startBtn = document.getElementById("clStartBtn");
  if (startBtn) {
    startBtn.addEventListener("click", () => {
      if (startBtn.disabled) return;
      if (total === 0) _ackDay(activeDate);
      _renderNextCard(currentRoute);
      // Live-ETA hopper inn så snart neste-stopp-kortet er rendret
      pollLive();
    });
  }
}

// ── KALENDER-EKSPORT ────────────────────────────────────────────────────────
// Lager en .ics-fil med ett event som dekker hele arbeidsøkten:
//   Start = avgang fra Nesttun-depotet (route.start_clock)
//   Slutt = siste leverings tidspunkt (siste stops departure_clock || arrival_clock)
// Sjåføren trykker på 📅-knappen → mobilen tilbyr å legge eventet inn i
// standardkalenderen (iOS Kalender / Google Kalender). Ingen subscription —
// hver dag må trykkes inn for seg (men det er kun ett trykk per dag, og det
// er det brukeren har bedt om).
function _icsEsc(s){
  return String(s == null ? '' : s)
    .replace(/\\/g, '\\\\')
    .replace(/;/g,  '\\;')
    .replace(/,/g,  '\\,')
    .replace(/\r?\n/g, '\\n');
}
function _icsLocalStamp(dateIso, hhmm){
  // YYYYMMDDTHHMMSS — uten Z, kombineres med TZID=Europe/Oslo
  const d = String(dateIso || '').replace(/-/g, '');
  const t = String(hhmm || '00:00').replace(':', '') + '00';
  return `${d}T${t}`;
}
function _icsUtcStamp(){
  const z = (n) => String(n).padStart(2, '0');
  const d = new Date();
  return `${d.getUTCFullYear()}${z(d.getUTCMonth()+1)}${z(d.getUTCDate())}T${z(d.getUTCHours())}${z(d.getUTCMinutes())}${z(d.getUTCSeconds())}Z`;
}
function _foldIcsLine(line){
  // RFC 5545: linjer skal være ≤75 oktetter, vi bruker konservative 73 og
  // splitter med CRLF + space. Trygt nok for ASCII-tunge linjer.
  if (line.length <= 73) return line;
  const parts = [];
  for (let i = 0; i < line.length; i += 73) {
    parts.push((i === 0 ? '' : ' ') + line.slice(i, i + 73));
  }
  return parts.join('\r\n');
}
function buildRouteIcs(route){
  if (!route) return null;
  const date = route.date;
  const start = route.start_clock;
  const stops = Array.isArray(route.stops) ? route.stops : [];
  if (!date || !start || !stops.length) return null;
  // Slutt-tid: bruk departure_clock fra siste stopp hvis tilgjengelig, ellers
  // arrival_clock. Det matcher "Ferdig med ruten"-raden nederst i timelinen.
  const last = stops[stops.length - 1];
  const end = last && (last.departure_clock || last.arrival_clock);
  if (!end) return null;
  const stopsList = stops.map((s, i) => {
    const adr = [s.adresse, s.postnr, s.poststed].filter(Boolean).join(', ');
    return `${i+1}. ${s.arrival_clock || ''} — ${s.navn || ''}${adr ? ' · ' + adr : ''}`;
  }).join('\n');
  const summary = `Havøyet rute · ${stops.length} stopp`;
  const description = `Start fra Nesttun ${start}\nSlutt etter siste levering ${end}\n\nStopp:\n${stopsList}`;
  const uid = `havoyet-route-${date}@havoyet.no`;
  const lines = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//Havoyet//Sjafor//NB',
    'CALSCALE:GREGORIAN',
    'METHOD:PUBLISH',
    // Europe/Oslo VTIMEZONE — kort, dekker CET/CEST DST-regler i Norge
    'BEGIN:VTIMEZONE',
    'TZID:Europe/Oslo',
    'BEGIN:STANDARD',
    'DTSTART:19701025T030000',
    'RRULE:FREQ=YEARLY;BYDAY=-1SU;BYMONTH=10',
    'TZOFFSETFROM:+0200',
    'TZOFFSETTO:+0100',
    'TZNAME:CET',
    'END:STANDARD',
    'BEGIN:DAYLIGHT',
    'DTSTART:19700329T020000',
    'RRULE:FREQ=YEARLY;BYDAY=-1SU;BYMONTH=3',
    'TZOFFSETFROM:+0100',
    'TZOFFSETTO:+0200',
    'TZNAME:CEST',
    'END:DAYLIGHT',
    'END:VTIMEZONE',
    'BEGIN:VEVENT',
    `UID:${uid}`,
    `DTSTAMP:${_icsUtcStamp()}`,
    `DTSTART;TZID=Europe/Oslo:${_icsLocalStamp(date, start)}`,
    `DTEND;TZID=Europe/Oslo:${_icsLocalStamp(date, end)}`,
    `SUMMARY:${_icsEsc(summary)}`,
    `DESCRIPTION:${_icsEsc(description)}`,
    `LOCATION:${_icsEsc('Nesttun depot')}`,
    'END:VEVENT',
    'END:VCALENDAR',
  ].map(_foldIcsLine);
  return lines.join('\r\n') + '\r\n';
}
function downloadCalendar(){
  if (!currentRoute || !(currentRoute.stops || []).length) {
    alert('Ingen rute er lastet ennå — last på nytt eller velg en dato med leveringer.');
    return;
  }
  if (currentRoute.awaiting_approval) {
    if (!confirm('Ruten er ikke godkjent av admin ennå. Legge den i kalenderen likevel?')) return;
  }
  const ics = buildRouteIcs(currentRoute);
  if (!ics) {
    alert('Mangler start- eller slutt-tidspunkt — kan ikke lage kalender-event.');
    return;
  }
  const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `havoyet-rute-${currentRoute.date}.ics`;
  // iOS Safari trenger at lenken er i DOM-en før click() for å åpne fila
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 2000);
}

async function handleLogin(){
  const pin = $("pin").value.trim();
  if (!pin) return;
  $("pinErr").textContent = "";
  $("pinBtn").disabled = true;
  $("pinBtn").textContent = "Sjekker …";
  const ok = await tryAuth(pin);
  $("pinBtn").disabled = false;
  $("pinBtn").textContent = "Logg inn";
  if (!ok) { $("pinErr").textContent = "Feil PIN. Prøv igjen."; $("pin").value = ""; return; }
  setPin(pin);
  showApp();
}

window.addEventListener("DOMContentLoaded", async () => {
  $("pinBtn").addEventListener("click", handleLogin);
  $("pin").addEventListener("keydown", e => { if (e.key === "Enter") handleLogin(); });
  // Hindre alt som ikke er siffer + auto-submit ved 4 siffer
  $("pin").addEventListener("input", e => {
    const cleaned = e.target.value.replace(/\D/g, "").slice(0, 4);
    if (cleaned !== e.target.value) e.target.value = cleaned;
    if (cleaned.length === 4) handleLogin();
  });
  $("refreshBtn").addEventListener("click", () => loadRoute());
  $("calBtn").addEventListener("click", () => downloadCalendar());
  $("logoutBtn").addEventListener("click", () => {
    if (!confirm("Logge ut?")) return;
    clearPin();
    showPinScreen("");
  });

  $("datePrev").addEventListener("click", () => shiftDate(-1));
  $("dateNext").addEventListener("click", () => shiftDate(1));
  $("recenterBtn").addEventListener("click", () => {
    if (!currentRoute || !currentRoute.depot) return;
    const stops = currentRoute.stops || [];
    if (!stops.length) { map.setView([currentRoute.depot.lat, currentRoute.depot.lon], 13); return; }
    const all = [[currentRoute.depot.lat, currentRoute.depot.lon],
                 ...stops.map(s => [s.lat, s.lon])];
    map.fitBounds(L.latLngBounds(all), {padding:[40,40], animate:true});
  });
  updateDateLabel();

  // Auto-login hvis PIN finnes
  const saved = getPin();
  if (saved) {
    if (await tryAuth(saved)) { showApp(); return; }
    clearPin();
  }
  showPinScreen("");
});
</script>
