services:
  - type: web
    name: havoyet-bestilling
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    disk:
      name: havoyet-state
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: SHOPIFY_SHOP
        value: havoyet.myshopify.com
      - key: SHOPIFY_TOKEN
        value: ""
      - key: SHOPIFY_API_VERSION
        value: "2024-01"
      - key: POLL_INTERVAL
        value: "300"
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM
        sync: false
