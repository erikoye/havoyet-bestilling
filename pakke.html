<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Pakke &amp; Merk &mdash; Havøyet AS</title>
  <link rel="icon" type="image/png" href="https://havoyet.no/assets/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:    #0d9488;
      --primary-dk: #0f766e;
      --bg:         #f1f5f9;
      --dark:       #0f172a;
      --surface:    #ffffff;
      --border:     #e2e8f0;
      --muted:      #64748b;
      --c-red:      #ef4444;
      --c-orange:   #f59e0b;
      --c-green:    #22c55e;
      --avail-ok:   #16a34a;
      --avail-unsure:#d97706;
      --avail-no:   #dc2626;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── TOPBAR ── */
    header {
      background: var(--dark);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 56px;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      z-index: 200;
    }

    .header-left { display: flex; align-items: center; gap: 14px; }

    .back-btn {
      display: flex; align-items: center; gap: 6px;
      color: #94a3b8; text-decoration: none; font-size: 13px; font-weight: 500;
      padding: 6px 10px; border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }
    .back-btn:hover { color: #fff; background: #1e293b; }

    .divider { width: 1px; height: 20px; background: #334155; }

    .clock { font-family: 'DM Mono', monospace; font-size: 12px; color: #94a3b8; }

    /* ── LAYOUT ── */
    main { flex: 1; max-width: 900px; margin: 0 auto; width: 100%; padding: 28px 24px 100px; }

    /* ══════════════════════════════════════════
       VIEW 1 — ORDRELISTE
    ══════════════════════════════════════════ */

    .list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      gap: 16px;
      flex-wrap: wrap;
    }

    .list-title { font-size: 22px; font-weight: 600; color: var(--dark); }
    .list-count {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 10px;
    }

    /* Sort bar */
    .sort-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .sort-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-right: 4px;
    }

    .sort-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      font-size: 13px;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }

    .sort-btn:hover { border-color: var(--primary); color: var(--primary-dk); }

    .sort-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    .sort-icon { width: 14px; height: 14px; flex-shrink: 0; }

    /* ── BUTIKKVELGER ── */
    .store-sw-sep { width: 1px; background: var(--border); margin: 0 6px; align-self: stretch; }
    .store-sw-btn { display: flex; align-items: center; gap: 6px; padding: 7px 14px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface); font-size: 13px; font-weight: 500; font-family: 'DM Sans', sans-serif; color: var(--muted); cursor: pointer; transition: border-color 0.15s, color 0.15s, background 0.15s; }
    .store-sw-btn:hover { border-color: var(--primary); color: var(--primary-dk); }
    .store-sw-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; }

    .sort-arrow { font-size: 10px; opacity: 0.7; }

    /* Order list */
    .order-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .order-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.1s;
      text-decoration: none;
      color: inherit;
    }

    .order-row:hover {
      border-color: var(--primary);
      box-shadow: 0 2px 12px rgba(13,148,136,0.10);
      transform: translateY(-1px);
    }

    /* Priority stripe */
    .order-row.conf-red    { border-left: 4px solid var(--c-red); }
    .order-row.conf-orange { border-left: 4px solid var(--c-orange); }
    .order-row.conf-green  { border-left: 4px solid var(--c-green); }

    .or-date {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-width: 52px;
      flex-shrink: 0;
    }

    .or-date-day {
      font-family: 'DM Mono', monospace;
      font-size: 22px;
      font-weight: 500;
      color: var(--dark);
      line-height: 1;
    }

    .or-date-month {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-top: 2px;
    }

    .or-date-today .or-date-day { color: var(--primary); }
    .or-date-today .or-date-month { color: var(--primary); }

    .or-divider { width: 1px; height: 40px; background: var(--border); flex-shrink: 0; }

    .or-main { flex: 1; min-width: 0; }

    .or-customer {
      font-size: 15px;
      font-weight: 600;
      color: var(--dark);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .or-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .or-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      color: var(--muted);
    }

    .or-slot-chip {
      display: inline-flex;
      align-items: center;
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      font-weight: 500;
    }

    .or-slot-chip.a { background: #eff6ff; color: #2563eb; }
    .or-slot-chip.b { background: #faf5ff; color: #7c3aed; }

    .or-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      flex-shrink: 0;
      min-width: 100px;
    }

    .or-conf-label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }

    .or-bar-bg {
      width: 90px;
      height: 5px;
      background: #e2e8f0;
      border-radius: 3px;
      overflow: hidden;
    }

    .or-bar { height: 100%; border-radius: 3px; }
    .or-bar.red    { background: var(--c-red); }
    .or-bar.orange { background: var(--c-orange); }
    .or-bar.green  { background: var(--c-green); }

    .or-items-count {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }

    .btn-pakk {
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s;
      white-space: nowrap;
    }

    .btn-pakk:hover { background: var(--primary-dk); }

    .today-badge {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      background: var(--primary);
      color: #fff;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .unseen-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--primary); flex-shrink: 0;
    }

    /* Empty state */
    .empty-state {
      text-align: center; padding: 60px 24px; color: var(--muted);
    }
    .empty-state h2 { font-size: 16px; margin-bottom: 8px; }
    .empty-state p  { font-size: 13px; }

    /* ══════════════════════════════════════════
       VIEW 2 — PAKKESKJEMA
    ══════════════════════════════════════════ */
    #viewDetail { display: none; }

    .detail-back {
      display: inline-flex; align-items: center; gap: 7px;
      color: var(--primary); font-size: 13px; font-weight: 600;
      background: none; border: none; cursor: pointer; padding: 0;
      margin-bottom: 20px;
      font-family: 'DM Sans', sans-serif;
    }
    .detail-back:hover { text-decoration: underline; }

    /* Order header */
    .order-header {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 24px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .order-header-left { display: flex; flex-direction: column; gap: 4px; }
    .order-customer { font-size: 20px; font-weight: 600; color: var(--dark); }
    .order-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-top: 4px; }

    .meta-chip {
      display: inline-flex; align-items: center; gap: 5px;
      font-family: 'DM Mono', monospace; font-size: 11px;
      background: #f8fafc; border: 1px solid var(--border);
      border-radius: 5px; padding: 3px 8px; color: var(--muted);
    }

    .progress-wrap { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; min-width: 120px; }
    .progress-label { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); }
    .progress-bar-bg { width: 120px; height: 6px; background: #e2e8f0; border-radius: 3px; overflow: hidden; }
    .progress-bar-fill { height: 100%; border-radius: 3px; background: var(--c-green); transition: width 0.4s; }

    .section-label {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.07em; color: var(--muted); margin-bottom: 10px;
    }

    /* Item cards */
    .items-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 28px; }

    .item-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    /* Kasse-rad — beholder for underprodukter */
    .kasse-card { background: #f8fafc; border: 1px solid var(--border); border-left: 4px solid var(--primary); border-radius: 12px; padding: 14px 16px 8px; margin-bottom: 10px; }
    .kasse-head { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
    .kasse-info { flex: 1; min-width: 0; }
    .kasse-title { font-size: 14px; font-weight: 600; color: var(--dark); }
    .kasse-meta  { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 3px; letter-spacing: 0.02em; }
    .kasse-progress { font-size: 11px; color: var(--muted); padding: 4px 9px; background: var(--surface); border: 1px solid var(--border); border-radius: 999px; white-space: nowrap; flex-shrink: 0; font-family: 'DM Mono', monospace; }
    .kasse-progress.green { background: #f0fdf4; color: var(--avail-ok); border-color: #bbf7d0; }
    .kasse-empty { font-size: 12px; color: var(--muted); padding: 12px; background: var(--surface); border: 1px dashed var(--border); border-radius: 8px; text-align: center; }
    .kasse-components { display: flex; flex-direction: column; gap: 8px; }
    .kasse-card .item-card { margin-bottom: 0; background: var(--surface); }
    .item-card.status-ok     { border-left: 4px solid var(--avail-ok); }
    .item-card.status-unsure { border-left: 4px solid var(--avail-unsure); }
    .item-card.status-no     { border-left: 4px solid var(--avail-no); }

    .item-top {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px; gap: 12px; flex-wrap: wrap;
    }

    .item-name { font-size: 15px; font-weight: 600; color: var(--dark); flex: 1; min-width: 140px; }
    .item-qty  { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); flex-shrink: 0; }

    /* Mengde-editor på bestilling-kort: input + enhets-velger, synkes mot admin/min side */
    .item-qty-edit { display: inline-flex; align-items: center; gap: 4px; flex-shrink: 0; }
    .item-qty-edit input[type=number] {
      width: 64px; padding: 5px 7px; font-size: 13px; font-weight: 600;
      font-family: 'DM Mono', monospace; text-align: right;
      border: 1px solid var(--border); border-radius: 6px; background: var(--surface);
      color: var(--dark);
    }
    .item-qty-edit input[type=number]:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px rgba(13,148,136,.15); }
    .item-qty-edit select {
      padding: 5px 6px; font-size: 12px; font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      border: 1px solid var(--border); border-radius: 6px; background: var(--surface);
      color: var(--muted); cursor: pointer;
    }
    .item-qty-edit .saved-flash { font-size: 11px; color: var(--c-green); font-weight: 600; opacity: 0; transition: opacity .2s; }
    .item-qty-edit.saved .saved-flash { opacity: 1; }
    .item-qty-edit.readonly {
      font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 600;
      color: var(--dark); background: #f1f5f9; padding: 5px 10px; border-radius: 6px;
      display: inline-flex; align-items: baseline; gap: 4px;
    }
    .item-qty-edit.readonly .qty-num  { font-size: 14px; }
    .item-qty-edit.readonly .qty-unit { font-size: 11px; font-weight: 700; color: var(--primary-dk); text-transform: uppercase; letter-spacing: .04em; }

    /* Availability toggle */
    .avail-toggle { display: flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; flex-shrink: 0; }

    .avail-btn {
      padding: 7px 14px; font-size: 12px; font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      border: none; background: #f8fafc; color: var(--muted);
      cursor: pointer; transition: background 0.15s, color 0.15s;
      border-right: 1px solid var(--border); white-space: nowrap;
    }

    .avail-btn:last-child { border-right: none; }
    .avail-btn:hover { background: #f1f5f9; }
    .avail-btn.active-ok     { background: #f0fdf4; color: var(--avail-ok); }
    .avail-btn.active-unsure { background: #fffbeb; color: var(--avail-unsure); }
    .avail-btn.active-no     { background: #fef2f2; color: var(--avail-no); }

    /* Input fields */
    .item-fields { display: none; padding: 0 18px 16px; gap: 14px; flex-wrap: wrap; }
    .item-fields.visible { display: flex; }

    .field-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 140px; }
    .field-group label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); }

    .field-input {
      height: 40px; border: 1px solid var(--border); border-radius: 8px;
      padding: 0 12px; font-size: 14px; font-family: 'DM Mono', monospace;
      color: var(--dark); background: #f8fafc; transition: border-color 0.15s, background 0.15s; width: 100%;
    }
    .field-input:focus { outline: none; border-color: var(--primary); background: #fff; }
    .field-input.filled { background: #fff; border-color: #99f6e4; }

    .field-suffix { display: flex; gap: 6px; align-items: center; }
    .field-suffix .field-input { flex: 1; }
    .field-suffix-label {
      font-family: 'DM Mono', monospace; font-size: 12px; color: #94a3b8;
    }

    /* Unit toggle */
    .unit-toggle { display: flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; flex-shrink: 0; height: 40px; }
    .unit-btn { padding: 0 10px; font-size: 12px; font-weight: 600; font-family: 'DM Sans', sans-serif; border: none; background: #f8fafc; color: var(--muted); cursor: pointer; transition: background 0.15s, color 0.15s; }
    .unit-btn + .unit-btn { border-left: 1px solid var(--border); }
    .unit-btn.active { background: var(--primary); color: #fff; }

    /* Order note */
    .order-note-section { margin-top: 24px; }
    .note-textarea { width: 100%; min-height: 80px; border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; font-size: 13px; font-family: 'DM Sans', sans-serif; color: var(--dark); resize: vertical; outline: none; transition: border-color 0.15s; background: #fff; }
    .note-textarea:focus { border-color: var(--primary); }

    /* Per-item comment */
    .item-comment-row { padding: 0 18px 14px; }
    .item-comment-input { width: 100%; border: 1px solid var(--border); border-radius: 6px; padding: 7px 11px; font-size: 12px; font-family: 'DM Sans', sans-serif; color: var(--dark); outline: none; transition: border-color 0.15s; background: #fafafa; resize: none; min-height: 34px; }
    .item-comment-input:focus { border-color: var(--primary); background: #fff; }
    .item-comment-input::placeholder { color: #94a3b8; }

    .field-check { display: flex; align-items: center; gap: 5px; font-size: 11px; font-family: 'DM Mono', monospace; margin-top: 3px; height: 16px; }
    .field-check.ok    { color: var(--avail-ok); }
    .field-check.empty { color: transparent; }

    /* Replacement section */
    .replacement-section { display: none; padding: 0 18px 18px; flex-direction: column; gap: 12px; }
    .replacement-section.visible { display: flex; }

    .replacement-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .replacement-title  { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }

    .search-row { display: flex; gap: 8px; }
    .search-input {
      flex: 1; height: 38px; border: 1px solid var(--border); border-radius: 8px;
      padding: 0 12px; font-size: 13px; font-family: 'DM Sans', sans-serif;
      color: var(--dark); background: #f8fafc; transition: border-color 0.15s;
    }
    .search-input:focus { outline: none; border-color: var(--primary); background: #fff; }
    .search-input::placeholder { color: #94a3b8; }

    .search-results { display: none; background: #f8fafc; border: 1px solid var(--border); border-radius: 8px; max-height: 180px; overflow-y: auto; }
    .search-results.visible { display: block; }

    .result-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; cursor: pointer; border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    .result-item:last-child { border-bottom: none; }
    .result-item:hover { background: #f1f5f9; }
    .result-item.selected { background: #f0fdfb; }

    .result-check {
      width: 18px; height: 18px; border: 2px solid #cbd5e1; border-radius: 4px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      transition: border-color 0.15s, background 0.15s;
    }
    .result-item.selected .result-check { border-color: var(--primary); background: var(--primary); }
    .result-name   { font-size: 13px; font-weight: 500; color: var(--dark); }
    .result-detail { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; margin-left: auto; flex-shrink: 0; }

    .selected-replacements { display: flex; flex-wrap: wrap; gap: 6px; }

    .replacement-chip {
      display: inline-flex; align-items: center; gap: 6px;
      background: #f0fdfb; border: 1px solid #99f6e4; border-radius: 20px;
      padding: 4px 10px 4px 12px; font-size: 12px; font-weight: 500; color: var(--primary-dk);
    }

    .chip-remove {
      background: none; border: none; cursor: pointer;
      color: #94a3b8; font-size: 14px; padding: 0; line-height: 1;
      transition: color 0.1s;
    }
    .chip-remove:hover { color: var(--c-red); }

    .chip-confirm {
      background: none; border: none; cursor: pointer;
      color: var(--primary); font-size: 11px; font-weight: 700;
      padding: 0 2px 0 4px; line-height: 1; font-family: 'DM Sans', sans-serif;
      transition: color 0.1s;
    }
    .chip-confirm:hover { color: var(--primary-dk); }

    .replacement-chip.confirmed {
      background: #dcfce7; border-color: #86efac; color: #15803d;
    }
    .replacement-chip.confirmed .chip-confirm { display: none; }
    .item-name.replaced { color: var(--muted); text-decoration: line-through; font-size: 13px; font-weight: 400; }
    .item-name-replacement { font-size: 15px; font-weight: 600; color: var(--primary-dk); }

    /* ── STICKY FOOTER ── */
    .bottom-toolbar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--surface); border-top: 1px solid var(--border);
      padding: 12px 24px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      z-index: 100;
    }

    .toolbar-left { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); }
    .toolbar-right { display: flex; gap: 8px; }

    .btn-ghost {
      background: none; border: 1px solid var(--border); border-radius: 8px;
      padding: 10px 18px; font-size: 13px; font-family: 'DM Sans', sans-serif;
      font-weight: 500; color: var(--dark); cursor: pointer;
      transition: border-color 0.15s;
    }
    .btn-ghost:hover { border-color: var(--primary); color: var(--primary); }

    .btn-delete {
      background: none; border: 1px solid #fecaca; border-radius: 8px;
      padding: 10px 16px; font-size: 13px; font-family: 'DM Sans', sans-serif;
      font-weight: 500; color: #ef4444; cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-delete:hover { background: #fef2f2; border-color: #ef4444; }

    /* Slett-bekreftelse modal */
    .confirm-overlay {
      position: fixed; inset: 0; background: rgba(15,23,42,0.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 500; opacity: 0; pointer-events: none;
      transition: opacity 0.15s;
    }
    .confirm-overlay.visible { opacity: 1; pointer-events: all; }
    .confirm-modal {
      background: var(--surface); border-radius: 14px;
      padding: 28px 28px 22px; max-width: 380px; width: calc(100% - 48px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      transform: translateY(8px); transition: transform 0.15s;
    }
    .confirm-overlay.visible .confirm-modal { transform: translateY(0); }
    .confirm-modal-icon {
      width: 44px; height: 44px; border-radius: 50%;
      background: #fef2f2; display: flex; align-items: center; justify-content: center;
      margin-bottom: 14px;
    }
    .confirm-modal-title { font-size: 16px; font-weight: 600; color: var(--dark); margin-bottom: 6px; }
    .confirm-modal-sub   { font-size: 13px; color: var(--muted); margin-bottom: 22px; line-height: 1.5; }
    .confirm-modal-btns  { display: flex; gap: 8px; justify-content: flex-end; }
    .confirm-cancel {
      background: none; border: 1px solid var(--border); border-radius: 8px;
      padding: 9px 18px; font-size: 13px; font-weight: 500;
      font-family: 'DM Sans', sans-serif; color: var(--dark); cursor: pointer;
      transition: border-color 0.15s;
    }
    .confirm-cancel:hover { border-color: var(--primary); color: var(--primary); }
    .confirm-ok {
      background: #ef4444; border: none; border-radius: 8px;
      padding: 9px 18px; font-size: 13px; font-weight: 600;
      font-family: 'DM Sans', sans-serif; color: #fff; cursor: pointer;
      transition: background 0.15s;
    }
    .confirm-ok:hover { background: #dc2626; }

    /* Angre-toast */
    .undo-toast {
      position: fixed; bottom: 80px; right: 24px; z-index: 400;
      background: var(--dark); color: #fff; border-radius: 10px;
      padding: 12px 16px; display: flex; align-items: center; gap: 12px;
      font-size: 13px; font-family: 'DM Sans', sans-serif;
      opacity: 0; transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s; pointer-events: none;
    }
    .undo-toast.visible { opacity: 1; transform: translateY(0); pointer-events: all; }
    .undo-btn {
      background: var(--primary); color: #fff; border: none; border-radius: 6px;
      padding: 5px 12px; font-size: 12px; font-weight: 600; cursor: pointer;
      font-family: 'DM Sans', sans-serif; white-space: nowrap;
    }
    .undo-btn:hover { background: var(--primary-dk); }
    .undo-countdown { font-size: 11px; color: #94a3b8; min-width: 14px; }

    .btn-print {
      background: var(--dark); color: #fff; border: none; border-radius: 8px;
      padding: 10px 20px; font-size: 13px; font-family: 'DM Sans', sans-serif; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; gap: 8px;
      transition: background 0.15s;
    }
    .btn-print:hover { background: #1e293b; }
    .btn-print:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(10px);
      background: var(--dark); color: #fff; font-size: 13px; font-weight: 500;
      padding: 10px 20px; border-radius: 8px; opacity: 0;
      transition: opacity 0.2s, transform 0.2s; pointer-events: none; white-space: nowrap; z-index: 300;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Footer bar (list view) */
    .list-footer {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--surface); border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 24px; z-index: 100;
    }
    .list-footer span { font-family: 'DM Mono', monospace; font-size: 11px; color: #94a3b8; }
    .printer-status { display: flex; align-items: center; gap: 6px; font-family: 'DM Mono', monospace; font-size: 11px; color: #94a3b8; }
    .printer-dot    { width: 7px; height: 7px; border-radius: 50%; background: var(--c-green); }

    /* ── TOUCH & MOBIL ── */
    button, a { touch-action: manipulation; }
    button { -webkit-tap-highlight-color: transparent; }

    @media (max-width: 700px) {
      header { padding: 0 14px; height: 50px; }
      main { padding: 14px 12px 100px; }

      /* Ordreliste */
      .list-header { padding: 14px 0 10px; }
      .sort-bar { gap: 6px; padding: 8px 0; overflow-x: auto; flex-wrap: nowrap; }
      .sort-btn { font-size: 11px; padding: 5px 10px; white-space: nowrap; }

      .order-row { padding: 12px; gap: 10px; min-height: 64px; }
      .or-date { min-width: 36px; }
      .or-date-day { font-size: 22px; }
      .or-date-month { font-size: 10px; }
      .or-customer { font-size: 14px; }
      .or-right { display: none; }
      .btn-pakk { padding: 8px 14px; font-size: 13px; min-height: 40px; }

      /* Detaljvisning */
      .order-header { flex-direction: column; gap: 10px; }
      .progress-wrap { width: 100%; align-items: flex-start; }
      .item-card { padding: 14px; }
      .item-top { flex-wrap: wrap; gap: 8px; }
      .avail-toggle { flex-wrap: wrap; gap: 6px; }
      .avail-toggle button { min-height: 38px; font-size: 12px; }
      .fields-row { flex-direction: column; }

      /* Toolbar */
      .bottom-toolbar { padding: 10px 14px; gap: 8px; }
      .toolbar-left { font-size: 11px; }
      .btn-ghost, .btn-print { min-height: 42px; font-size: 13px; }
    }

    @media (max-height: 500px) and (orientation: landscape) {
      header { height: 44px; }
      main { padding: 10px 16px 90px; }
      .sort-bar { padding: 6px 0; }
      .bottom-toolbar { padding: 8px 16px; }
    }

    @media (min-width: 768px) and (max-width: 1100px) {
      main { max-width: 100%; padding: 20px 28px 100px; }
    }

    /* ── VIEW TABS ── */
    .view-tab-bar{display:flex;gap:8px;margin-bottom:20px;}
    .view-tab-btn{padding:8px 18px;border:1px solid var(--border);border-radius:8px;background:var(--surface);font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;color:var(--muted);cursor:pointer;transition:all .15s;}
    .view-tab-btn:hover{border-color:var(--primary);color:var(--primary-dk);}

    /* ── PRODUKTOVERSIKT ── */
    .prod-list{display:flex;flex-direction:column;gap:10px;}

    .prod-main{flex:1;min-width:0;}
    .prod-name{font-size:15px;font-weight:600;color:var(--dark);}

    .prod-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
    .prod-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:99px;}
    .prod-badge.mangler{background:#fee2e2;color:#dc2626;}
    .prod-badge.klar{background:#dcfce7;color:#15803d;}
    .prod-bar-bg{width:80px;height:5px;background:#e2e8f0;border-radius:3px;overflow:hidden;}

    .prod-bar.orange{background:var(--c-orange);}
    .prod-bar.green{background:var(--c-green);}
    .prod-arrow{flex-shrink:0;color:var(--muted);}

    /* Produktdetalj */
    .proddetail-back{display:inline-flex;align-items:center;gap:7px;color:var(--primary);font-size:13px;font-weight:600;background:none;border:none;cursor:pointer;padding:0;margin-bottom:20px;font-family:'DM Sans',sans-serif;}
    .proddetail-back:hover{text-decoration:underline;}
    .variant-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:10px;}
    .variant-header{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}

    .order-refs{margin-top:10px;display:flex;flex-wrap:wrap;gap:6px;}
    .order-ref{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-family:'DM Mono',monospace;background:#f8fafc;border:1px solid var(--border);border-radius:6px;padding:4px 9px;color:var(--muted);cursor:pointer;transition:border-color .15s;}
    .order-ref:hover{border-color:var(--primary);color:var(--primary);}
    .prod-detail-header{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 22px;margin-bottom:20px;}

// ─── DATA ───────────────────────────────────
const FLASK_BASE = window.location.origin;
const _T = new Date(); _T.setHours(0,0,0,0);
function isoDate(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function dayOffset(n){const d=new Date(_T);d.setDate(d.getDate()+n);return isoDate(d);}
const todayISO = isoDate(_T);

let ORDERS = [];

// ─── STATE ──────────────────────────────────
const STATE = {};

// ─── KASSE-OPPSKRIFTER ──────────────────────
// Mapping fra kasse-type → komponenter med per-pers-mengde.
// Brukes til å splitte kasse-bestillinger i pakke-flyten så hver komponent kan
// markeres tilgjengelig/usikker/ikke mulig og veies separat. Etiketten skrives
// fortsatt ut for hele kassen (én etikett per kasse).
const KASSE_RECIPES = {
  klassisk: {
    displayName: 'Klassisk Skalldyrkasse',
    components: [
      { name: 'Reker',      perPersonGrams: 250, unit: 'g'   },
      { name: 'Blåskjell',  perPersonGrams: 200, unit: 'g'   },
      { name: 'Østers',     perPersonStk:   2,   unit: 'stk' },
      { name: 'Krabbeklør', perPersonGrams: 250, unit: 'g'   },
    ],
  },
  // Custom skalldyrkasse: komponenter er valgt av kunden.
  // Foreløpig vises melding "Komponenter ikke registrert" inntil vi piper
  // dem gjennom checkout-payloaden.
  custom: { displayName: 'Din Skalldyrkasse', components: [] },
};

// Parser kasse-info ut fra item.name (slik den kommer fra ordre).
// "Klassisk Skalldyrkasse (549kr pr pers) - 2 / Med is / Med tilbehør"
//   → { type: 'klassisk', persons: 2, displayName: 'Klassisk Skalldyrkasse' }
// "Din Skalldyrkasse - 3 / Med is" → { type: 'custom', persons: 3, ... }
function parseKasseInfo(name) {
  if (!name) return null;
  const lower = name.toLowerCase();
  let type = null;
  if (lower.includes('klassisk') && lower.includes('skalldyr')) type = 'klassisk';
  else if (lower.includes('din skalldyrkasse') || lower.includes('din-skalldyrkasse')) type = 'custom';
  if (!type) return null;
  // Finn antall personer: enten "- 2 /" eller "(2 pers)" eller bare "- 2"
  let persons = 2;
  const m1 = name.match(/[-–]\s*(\d+)\s*\//);
  const m2 = name.match(/\((\d+)\s*pers/i);
  if (m1) persons = parseInt(m1[1], 10);
  else if (m2) persons = parseInt(m2[1], 10);
  return { type, persons, displayName: KASSE_RECIPES[type].displayName };
}

// Lager state for hver komponent i en kasse.
function initKasseComponents(kasseInfo) {
  const recipe = KASSE_RECIPES[kasseInfo.type];
  if (!recipe || !recipe.components.length) return [];
  return recipe.components.map(c => {
    const expectedGrams = c.perPersonGrams ? c.perPersonGrams * kasseInfo.persons : 0;
    const expectedStk   = c.perPersonStk   ? c.perPersonStk   * kasseInfo.persons : 0;
    return {
      name: c.name,
      weight: '', expiry: '',
      weightUnit: c.unit || 'g',
      avail: null, replacements: [], confirmedReplacement: null, itemComment: '',
      expected: expectedGrams ? `${expectedGrams} g` : (expectedStk ? `${expectedStk} stk` : ''),
    };
  });
}

function initState(orders) {
  orders.forEach(o => {
    _ensureItems(o);
    if (!STATE[o.id]) {
      STATE[o.id] = (o.items || []).map(item => {
        const k = parseKasseInfo(item.name);
        if (k) {
          return { isKasse: true, kasseType: k.type, persons: k.persons, components: initKasseComponents(k), itemComment: '' };
        }
        return { weight:'', expiry:'', weightUnit: item.unit || 'g', avail:null, replacements:[], confirmedReplacement:null, itemComment:'' };
      });
    } else {
      // Bakoverkompatibilitet: fyll inn kasse-state hvis det mangler på en eksisterende ordre
      (o.items || []).forEach((item, i) => {
        const entry = STATE[o.id][i];
        const k = parseKasseInfo(item.name);
        if (k && (!entry || !entry.isKasse)) {
          STATE[o.id][i] = { isKasse: true, kasseType: k.type, persons: k.persons, components: initKasseComponents(k), itemComment: entry?.itemComment || '' };
        }
      });
    }
  });
}

// Tell bekreftede varer; en kasse teller hver komponent som en separat varelinje.
function countConfirmed(s) {
  let confirmed = 0, total = 0;
  (s || []).forEach(e => {
    if (e && e.isKasse) {
      (e.components || []).forEach(c => {
        total++;
        if (c.weight && c.expiry && c.avail === 'ok') confirmed++;
      });
    } else if (e) {
      total++;
      if (e.weight && e.expiry && e.avail === 'ok') confirmed++;
    }
  });
  return { confirmed, total };
}

// Multipliser mengde i variant-streng med antall
// f.eks. "200 g" × 2 → "400 g", "1 stk" × 4 → "4 stk", "500 g / Med skinn" × 2 → "1 kg / Med skinn"
function multiplyWeight(variant, qty) {
  if (!variant || qty <= 1) return variant;
  // Håndter stk (stykk)
  let result = variant.replace(/(\d+(?:[.,]\d+)?)\s*(stk)\b/i, (match, num, unit) => {
    return `${Math.round(parseFloat(num.replace(',', '.')) * qty)} ${unit}`;
  });
  // Håndter g og kg
  result = result.replace(/(\d+(?:[.,]\d+)?)\s*(g|kg)\b/i, (match, num, unit) => {
    const n     = parseFloat(num.replace(',', '.'));
    const grams = unit.toLowerCase() === 'kg' ? n * 1000 : n;
    const total = grams * qty;
    if (total >= 1000 && total % 1000 === 0) return `${total / 1000} kg`;
    if (total >= 1000) return `${(total / 1000).toFixed(1).replace('.0', '')} kg`;
    return `${total} g`;
  });
  return result;
}

// Normaliser Shopify-ordre til pakke.html sitt format
function normalizeOrder(o) {
  return {
    id:       o.id,
    customer: o.customer,
    phone:    o.phone || '',
    delivery: o.delivery || todayISO,
    slot:     o.slot || 'a',
    seen:     o.seen || false,
    status:   o.status || 'NEW',
    items:    (o.items || []).map(i => {
      const qty = i.quantity || 1;
      const variant = multiplyWeight(i.variant, qty);
      return {
        name: variant ? `${i.name} (${variant})` : i.name,
        productName: i.name,
        variantStr: i.variant || '',
        qty,
      };
    }),
  };
}

// ─── SERVER-SYNC (cross-device) ───────────────
async function syncFromServer() {
  try {
    const [manRes, hidRes, stRes, notRes] = await Promise.all([
      fetch(`${FLASK_BASE}/api/manual-orders`,  { signal: AbortSignal.timeout(3000) }),
      fetch(`${FLASK_BASE}/api/hidden-orders`,  { signal: AbortSignal.timeout(3000) }),
      fetch(`${FLASK_BASE}/api/packing-state`,  { signal: AbortSignal.timeout(3000) }),
      fetch(`${FLASK_BASE}/api/notes`,          { signal: AbortSignal.timeout(3000) }),
    ]);
    if (manRes.ok) {
      const serverManual = await manRes.json();
      const localManual  = JSON.parse(localStorage.getItem('havøyet_manual_orders') || '[]');
      const merged = [...serverManual];
      localManual.forEach(o => { if (!merged.find(s => s.id === o.id)) merged.push(o); });
      localStorage.setItem('havøyet_manual_orders', JSON.stringify(merged));
      if (merged.length > serverManual.length) serverPost('/api/manual-orders', merged);
    }
    if (hidRes.ok) {
      const serverHidden = await hidRes.json();
      const localHidden  = JSON.parse(localStorage.getItem('havøyet_hidden_orders') || '[]');
      const merged = [...new Set([...serverHidden, ...localHidden])];
      localStorage.setItem('havøyet_hidden_orders', JSON.stringify(merged));
      if (merged.length > serverHidden.length) serverPost('/api/hidden-orders', merged);
    }
    if (stRes.ok) {
      const serverState = await stRes.json();
      const localState  = JSON.parse(localStorage.getItem('havøyet_state') || '{}');
      // Merge: server vinner per ordre-id, behold lokale ordre som ikke finnes på server
      const merged = { ...localState, ...serverState };
      localStorage.setItem('havøyet_state', JSON.stringify(merged));
      if (Object.keys(serverState).length < Object.keys(merged).length) serverPost('/api/packing-state', merged);
    }
    if (notRes.ok) {
      const serverNotes = await notRes.json();
      const localNotes  = JSON.parse(localStorage.getItem('havøyet_notes') || '{}');
      const merged = { ...localNotes, ...serverNotes };
      localStorage.setItem('havøyet_notes', JSON.stringify(merged));
      if (Object.keys(serverNotes).length < Object.keys(merged).length) serverPost('/api/notes', merged);
    }
  } catch(e) { /* server ikke nådd */ }
}

function serverPost(endpoint, data) {
  fetch(`${FLASK_BASE}${endpoint}`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify(data)
  }).catch(()=>{});
}

// Konverterer admin-shape (varer:[{name,qty,unit,price,pris}]) til iPad-shape (items + topp-felter).
// Beholder `varer` på objektet så lagring tilbake til /api/manual-orders ikke mister format.
function _normalizeManualOrder(o){
  const k = o.kunde || {};
  const id = o.id || o.ordrenr || ('M' + Math.random().toString(16).slice(2, 8).toUpperCase());
  const items = (o.items && o.items.length ? o.items : (o.varer || [])).map(v => ({
    name: v.name || v.navn || v.title || '',
    productName: v.name || v.navn || '',
    variantStr: v.variant || '',
    qty: Number(v.qty || v.quantity || 1),
    unit: v.unit || '',
    price: Number(v.price || 0),
    pris: Number(v.pris || 0),
  }));
  return {
    ...o,
    id,
    customer: o.customer || k.navn || 'Ukjent',
    phone: o.phone || k.tlf || '',
    delivery: o.delivery || k.leveringsdag || todayISO,
    slot: o.slot || (k.leveringstid && /13|15/.test(k.leveringstid) ? 'a' : 'b'),
    seen: o.seen ?? false,
    status: o.status || 'NEW',
    items,
    // Delt referanse — endringer i items[i] reflekteres automatisk i varer[i] ved POST.
    varer: items,
  };
}

function mergeManualOrders() {
  // Kun staff-laget ordre (manual:true). Ubetalte kunde-ordre fra havoyet.no
  // skal ikke vises — de filtreres bort på server-siden i /api/orders.
  try {
    const manual = JSON.parse(localStorage.getItem('havøyet_manual_orders') || '[]');
    manual.forEach(o => {
      if (!o || o.manual !== true) return;
      const oid = o.id || o.ordrenr;
      if (!oid) return;
      const idx = ORDERS.findIndex(x => (x.id || x.ordrenr) === oid);
      const normalized = _normalizeManualOrder(o);
      if (idx >= 0) {
        // Bevar STATE som ligger på id-en (vekt/expiry/avail) — bare oppdater payload-feltene.
        ORDERS[idx] = normalized;
      } else {
        ORDERS.push(normalized);
      }
    });
  } catch(e) {}
}

function filterHiddenOrders() {
  try {
    const hidden = JSON.parse(localStorage.getItem('havøyet_hidden_orders') || '[]');
    if (hidden.length) ORDERS = ORDERS.filter(o => !hidden.includes(o.id));
  } catch(e) {}
}

function applyOverrides() {
  try {
    const ov = JSON.parse(localStorage.getItem('havøyet_order_overrides') || '{}');
    ORDERS.forEach(o => { if (ov[o.id]) { o.delivery = ov[o.id].delivery; o.slot = ov[o.id].slot; } });
  } catch(e) {}
}

let _lastDeleted = null;
let _undoTimer = null;
let _undoCountTimer = null;
let _pendingDeleteId = null;

function deleteOrder(id) {
  _pendingDeleteId = id;
  const o = ORDERS.find(x => x.id === id);
  if (o) document.getElementById('confirmModalSub').textContent =
    `«${o.customer}» vil bli fjernet. Du kan angre i 10 sekunder etter sletting.`;
  document.getElementById('confirmOverlay').classList.add('visible');
}

function cancelDelete() {
  _pendingDeleteId = null;
  document.getElementById('confirmOverlay').classList.remove('visible');
}

function confirmDelete() {
  const id = _pendingDeleteId;
  _pendingDeleteId = null;
  document.getElementById('confirmOverlay').classList.remove('visible');
  if (!id) return;

  // Lagre for angre
  _lastDeleted = {
    order: ORDERS.find(o => o.id === id),
    state: STATE[id] ? JSON.parse(JSON.stringify(STATE[id])) : null
  };

  // Fjern fra manuell liste
  let manual = [];
  try {
    manual = JSON.parse(localStorage.getItem('havøyet_manual_orders') || '[]');
    manual = manual.filter(o => o.id !== id);
    localStorage.setItem('havøyet_manual_orders', JSON.stringify(manual));
  } catch(e) {}
  // Legg til skjult liste
  let hidden = [];
  try {
    hidden = JSON.parse(localStorage.getItem('havøyet_hidden_orders') || '[]');
    if (!hidden.includes(id)) { hidden.push(id); localStorage.setItem('havøyet_hidden_orders', JSON.stringify(hidden)); }
  } catch(e) {}
  // Sync til server
  serverPost('/api/manual-orders', manual);
  serverPost('/api/hidden-orders', hidden);

  ORDERS = ORDERS.filter(o => o.id !== id);
  showList();
  showUndoToast();
}

function showUndoToast() {
  if (_undoTimer) { clearTimeout(_undoTimer); clearInterval(_undoCountTimer); }
  const toast = document.getElementById('undoToast');
  const cnt   = document.getElementById('undoCountdown');
  let secs = 10;
  cnt.textContent = secs;
  toast.classList.add('visible');
  _undoCountTimer = setInterval(() => {
    secs--;
    cnt.textContent = secs;
    if (secs <= 0) { clearInterval(_undoCountTimer); }
  }, 1000);
  _undoTimer = setTimeout(() => {
    toast.classList.remove('visible');
    _lastDeleted = null;
  }, 10000);
}

function undoDelete() {
  if (!_lastDeleted) return;
  clearTimeout(_undoTimer); clearInterval(_undoCountTimer);
  _undoTimer = null; _undoCountTimer = null;

  const { order, state } = _lastDeleted;
  _lastDeleted = null;

  // Fjern fra skjult liste
  let hidden = [];
  try {
    hidden = JSON.parse(localStorage.getItem('havøyet_hidden_orders') || '[]');
    hidden = hidden.filter(id => id !== order.id);
    localStorage.setItem('havøyet_hidden_orders', JSON.stringify(hidden));
  } catch(e) {}
  serverPost('/api/hidden-orders', hidden);
  // Legg tilbake i manuell liste hvis manuell ordre
  if (order.manual) {
    let manual = [];
    try {
      manual = JSON.parse(localStorage.getItem('havøyet_manual_orders') || '[]');
      if (!manual.find(o => o.id === order.id)) { manual.push(order); localStorage.setItem('havøyet_manual_orders', JSON.stringify(manual)); }
    } catch(e) {}
    serverPost('/api/manual-orders', manual);
  }

  ORDERS.push(order);
  if (state) STATE[order.id] = state;

  document.getElementById('undoToast').classList.remove('visible');
  renderList();
}

let _flaskRetryTimer = null;
function _scheduleFlaskRetry() {
  if (_flaskRetryTimer) return;
  _flaskRetryTimer = setInterval(() => loadFromFlask(), 30000);
}
function _cancelFlaskRetry() {
  if (!_flaskRetryTimer) return;
  clearInterval(_flaskRetryTimer);
  _flaskRetryTimer = null;
}

async function loadFromFlask() {
  try {
    const r = await fetch(`${FLASK_BASE}/api/orders`, { signal: AbortSignal.timeout(4000) });
    if (!r.ok) throw new Error();
    const data = await r.json();
    if (data.orders && data.orders.length > 0) {
      await syncFromServer();
      ORDERS = data.orders.map(normalizeOrder);
      mergeManualOrders();
      filterHiddenOrders();
      applyOverrides();
      initState(ORDERS);
      restoreState(); restoreNotes();
      localStorage.setItem('havøyet_orders', JSON.stringify(data.orders));
      _cancelFlaskRetry();
      setBanner(true, `Koblet til havoyet.no – ${ORDERS.length} bestilling${ORDERS.length !== 1 ? 'er' : ''} hentet`);
      // Skjul success-banneret etter 4 sekunder så det ikke ligger og distraherer
      setTimeout(() => { const b = document.getElementById('flaskBanner'); if (b) b.style.display = 'none'; }, 4000);

      const params = new URLSearchParams(location.search);
      const targetId = params.get('ordre');
      if (targetId) {
        const o = ORDERS.find(x => x.id === targetId);
        if (o) { openOrder(targetId); return; }
      }
      renderList();
      return;
    }
  } catch(e) { /* backend ikke oppe */ }
  // Backend ikke oppe → planlegg retry hvert 30 sek til den kommer tilbake
  _scheduleFlaskRetry();

  // Fallback: prøv server-sync for delte data, bruk sist kjente bestillinger fra localStorage
  await syncFromServer();
  const cached = localStorage.getItem('havøyet_orders');
  if (cached) {
    try {
      const data = JSON.parse(cached);
      ORDERS = data.map(normalizeOrder);
      mergeManualOrders();
      filterHiddenOrders();
      applyOverrides();
      initState(ORDERS);
      restoreState(); restoreNotes();
      setBanner(false, `Flask ikke tilgjengelig – viser sist lagrede bestillinger. Start app.py for å oppdatere.`);
    } catch(e) {}
  } else {
    setBanner(false, `Flask ikke kjørende. Start app.py for å hente bestillinger fra havoyet.no.`);
  }

  // Sjekk om en spesifikk ordre skal åpnes direkte
  const params = new URLSearchParams(location.search);
  const targetId = params.get('ordre');
  if (targetId) {
    const o = ORDERS.find(x => x.id === targetId);
    if (o) { openOrder(targetId); return; }
  }
  renderList();
}

let currentOrderId  = null;
let currentSortKey  = 'dato';
let sortDir         = {};  // per sort key: 1=asc, -1=desc

// ─── PRIORITET ──────────────────────────────
function confPct(o) {
  // For list view: we count items with weight+expiry set in STATE.
  // Kasser teller hver komponent som en separat varelinje.
  const s = STATE[o.id] || [];
  const { confirmed, total } = countConfirmed(s);
  return total ? Math.round(confirmed / total * 100) : 0;
}
function confClass(o) { const p=confPct(o); return p===100?'green':p>=33?'orange':'red'; }

// ─── SORT ───────────────────────────────────
function setSort(key) {
  if (currentSortKey === key) {
    sortDir[key] = (sortDir[key]||1) * -1;
  } else {
    currentSortKey = key;
    sortDir[key] = sortDir[key] || 1;
  }
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  const map = {dato:'sortDato',prioritet:'sortPri',alfabetisk:'sortAlf',varer:'sortVarer'};
  const btn = document.getElementById(map[key]);
  if (btn) {
    btn.classList.add('active');
    const arrow = btn.querySelector('.sort-arrow');
    if (arrow) arrow.textContent = (sortDir[key]||1) === 1 ? '↑' : '↓';
  }
  renderList();
}

// ─── BUTIKKFILTER ─────────────────────────────
function activeStore() {
  return localStorage.getItem('hv_active_store') || 'havoyet';
}
function storeFilter(o) {
  const s = activeStore();
  if (s === 'nesttun') return o.store === 'Nesttun Fisk & Vilt';
  return !o.store || o.store === 'Havøyet';
}
function setActiveStore(s) {
  localStorage.setItem('hv_active_store', s);
  document.getElementById('swHavoyet').classList.toggle('active', s === 'havoyet');
  document.getElementById('swNesttun').classList.toggle('active', s === 'nesttun');
  renderList();
}
function initStoreSwitcher() {
  const s = activeStore();
  document.getElementById('swHavoyet').classList.toggle('active', s === 'havoyet');
  document.getElementById('swNesttun').classList.toggle('active', s === 'nesttun');
}

function getSorted() {
  const dir = sortDir[currentSortKey] || 1;
  // Skjul ordre med leveringsdato i fortiden — de regnes som ferdig levert
  // og forurenser "Upakkede bestillinger"-listen ellers (forblir der i flere år).
  return [...ORDERS].filter(storeFilter).filter(o => {
    const d = String(o.delivery || '').slice(0, 10);
    return d && d >= todayISO;
  }).sort((a, b) => {
    if (currentSortKey === 'dato') {
      const cmp = a.delivery.localeCompare(b.delivery);
      // Secondary: slot a before b
      if (cmp !== 0) return cmp * dir;
      return a.slot.localeCompare(b.slot);
    }
    if (currentSortKey === 'prioritet') {
      // Lowest % first (most urgent)
      return (confPct(a) - confPct(b)) * dir;
    }
    if (currentSortKey === 'alfabetisk') {
      return a.customer.localeCompare(b.customer, 'nb') * dir;
    }
    if (currentSortKey === 'varer') {
      return (b.items.length - a.items.length) * dir;
    }
    return 0;
  });
}

// ─── RENDER LIST ────────────────────────────
const MONTHS_SHORT = ['jan','feb','mar','apr','mai','jun','jul','aug','sep','okt','nov','des'];

function renderList() {
  const orders  = getSorted();
  const listEl  = document.getElementById('orderList');
  const countEl = document.getElementById('listCount');
  countEl.textContent = orders.length + ' ordre';

  if (orders.length === 0) {
    listEl.innerHTML = `<div class="empty-state"><h2>Ingen bestillinger funnet</h2><p>Sørg for at Flask kjører:<br><code style="background:#f1f5f9;padding:4px 8px;border-radius:4px;font-size:12px">python3 app.py</code></p></div>`;
    return;
  }

  listEl.innerHTML = orders.map(o => {
    const cls   = confClass(o);
    const pct   = confPct(o);
    const d     = new Date(o.delivery + 'T00:00:00');
    const isToday = o.delivery === todayISO;
    const dayNum  = d.getDate();
    const month   = MONTHS_SHORT[d.getMonth()];
    const slot    = o.slot === 'a' ? '13–15' : '15–18';
    const dot     = !o.seen ? `<div class="unseen-dot" title="Ikke åpnet"></div>` : '';
    const todayBadge = isToday ? `<span class="today-badge">i dag</span>` : '';
    const stateForOrder = STATE[o.id] || [];
    const { confirmed } = countConfirmed(stateForOrder);

    return `<div class="order-row conf-${cls}" onclick="openOrder('${o.id}')">

// ─── FORMATERING AV VARENAVN MED ENHET ───────
// Fjerner trailing vekt/antall fra produktnavn — vekt registreres separat per pakke,
// så "Laks røkt 200g" → "Laks røkt", "Østers Fine de Clair Nr. 3 6 stk" → "Østers Fine de Clair Nr. 3".
function stripWeightSuffix(name) {
  if (!name) return '';
  return String(name)
    .replace(/\s+\d+(?:[.,]\d+)?\s*(?:g|gram|kg|stk|pk|pakke|porsjon(?:er)?)\b\.?\s*$/i, '')
    .trim();
}

function formatItemName(item) {
  const name = stripWeightSuffix(item.name || '');
  const unit = item.unit || '';
  if (!unit) return name;
  // Finn tall i parentes, f.eks. "(2300)" eller "(2300 – uten skinn)"
  return name.replace(/\((\d+(?:[.,]\d+)?)(\s*[–\-].*?)?\)/, (match, num, rest) => {
    const val = parseFloat(num.replace(',', '.'));
    const restStr = rest || '';
    if (unit === 'g' && val >= 1000) {
      const kg = (val / 1000).toLocaleString('nb-NO', { maximumFractionDigits: 3 }).replace(/,?0+$/, '');
      return `(${kg} kg${restStr})`;
    }
    return `(${num} ${unit}${restStr})`;
  });
}

// Sikrer at ordren har items-array. Manuelle ordre kan ankomme i admin-shape (varer) —
// her gjør vi en lazy normalisering så rendringen ikke krasjer på .map().
function _ensureItems(o){
  if (!o) return;
  if (Array.isArray(o.items) && o.items.length === (o.varer?.length || o.items.length)) return;
  if (typeof _normalizeManualOrder === 'function' && (o.manual || o.varer)) {
    const norm = _normalizeManualOrder(o);
    o.items = norm.items;
    o.varer = norm.items; // delt referanse — endringer reflekteres begge veier
    o.customer = o.customer || norm.customer;
    o.delivery = o.delivery || norm.delivery;
    o.slot = o.slot || norm.slot;
    o.phone = o.phone || norm.phone;
  } else if (!Array.isArray(o.items)) {
    o.items = [];
  }
}

// Gjetter enhet ut fra produktnavnet hvis item.unit ikke er satt.
// Brukes som fallback i qty-pillen så det alltid står tydelig hva
// tallet representerer (stk, g, kg).
function _guessUnitFromName(name){
  if (!name) return '';
  const n = String(name).toLowerCase();
  // Eksplisitt vekt i navnet → bruk den enheten
  if (/\b\d+\s*kg\b/i.test(n)) return 'kg';
  if (/\b\d+\s*g\b/i.test(n))  return 'g';
  if (/\b\d+\s*stk\b/i.test(n)) return 'stk';
  // Tradisjonelle stk-varer (skjell, østers, krabbeklør, hummer, glass, kasse, abonnement)
  const stkHints = ['østers','hummer','krabbeklør','blåskjell','muslinger','kamskjell','sjøkreps levende','sjøkreps fryst','kasse','abonnement','glass','stk','tilbehør','aioli','majones','sitron','dill','loff','surdeigsloff'];
  for (const h of stkHints) if (n.includes(h)) return 'stk';
  // Fisk/skalldyr i kg er normen
  return 'kg';
}

// Bestemmer om en ordre er manuelt opprettet (admin) — bare disse skal være editerbare,
// Stripe/Vipps-ordre er låst fordi qty kommer fra checkout-flyten og ville bli overskrevet.
function _orderIsManual(orderId){
  const o = ORDERS.find(x => x.id === orderId);
  return !!(o && o.manual === true);
}

function renderItemQtyEditor(item, i){
  const qty = (item && (item.qty ?? item.quantity)) ?? 1;
  const unit = (item && item.unit) || _guessUnitFromName(item && item.name) || 'stk';
  const editable = _orderIsManual(currentOrderId);
  if (!editable) {
    return `<div class="item-qty-edit readonly" title="Hentet fra kasseflyten — kan ikke endres her"><span class="qty-num">${qty}</span><span class="qty-unit">${unit}</span></div>`;
  }
  const baseUnits = ['kg','g','stk'];
  const allUnits = (unit && !baseUnits.includes(unit)) ? [...baseUnits, unit] : baseUnits;
  return `<div class="item-qty-edit" id="qtyEdit-${i}">
    <input type="number" min="0" step="any" value="${qty}" id="qtyInput-${i}"
      oninput="onItemQtyChange('${currentOrderId}',${i},'qty',this.value)" />
    <select id="qtyUnit-${i}" onchange="onItemQtyChange('${currentOrderId}',${i},'unit',this.value)">
      ${allUnits.map(u => `<option value="${u}" ${u===(unit||'kg')?'selected':''}>${u}</option>`).join('')}
    </select>
    <span class="saved-flash">✓</span>
  </div>`;
}

let _qtySaveTimers = {};
function onItemQtyChange(orderId, i, field, val){
  const o = ORDERS.find(x => x.id === orderId);
  if (!o || !o.manual) return;
  const list = o.varer || o.items || [];
  const item = list[i];
  if (!item) return;
  if (field === 'qty') item.qty = Number(val) || 0;
  else if (field === 'unit') item.unit = String(val || '').trim() || 'kg';
  if (item.price != null) {
    const q = Number(item.qty) || 0;
    const p = Number(item.price) || 0;
    item.pris = (item.unit === 'g') ? Math.round((q/1000) * p) : Math.round(q * p);
  }
  const total = list.reduce((s, v) => s + (Number(v.pris) || (Number(v.qty)||0) * (Number(v.price)||0)), 0);
  o.total = Math.round(total);
  o.sum = o.total;
  const key = `${orderId}:${i}:${field}`;
  if (_qtySaveTimers[key]) clearTimeout(_qtySaveTimers[key]);
  _qtySaveTimers[key] = setTimeout(() => persistManualOrder(o, i), 300);
}

async function persistManualOrder(o, lineIdx){
  let manual = [];
  try { manual = JSON.parse(localStorage.getItem('havøyet_manual_orders') || '[]'); } catch(e) {}
  const oid = o.id || o.ordrenr;
  const idx = manual.findIndex(x => (x.id || x.ordrenr) === oid);
  if (idx >= 0) manual[idx] = o; else manual.push(o);
  try { localStorage.setItem('havøyet_manual_orders', JSON.stringify(manual)); } catch(e) {}
  try {
    await serverPost('/api/manual-orders', manual);
    const wrap = document.getElementById('qtyEdit-' + lineIdx);
    if (wrap) {
      wrap.classList.add('saved');
      setTimeout(() => wrap.classList.remove('saved'), 900);
    }
  } catch (e) {
    console.warn('[pakke] Kunne ikke lagre mengde:', e.message);
  }
}

// Rendrer en kasse-bestilling som en gruppe komponent-cards.
function renderKasseCard(item, i, s) {
  const recipe = KASSE_RECIPES[s.kasseType];
  const titleBase = recipe ? recipe.displayName : (item.name || 'Kasse');
  const personLabel = `${s.persons} pers`;
  const cleanedItemName = stripWeightSuffix(item.name || '');
  const components = s.components || [];
  let confirmed = 0;
  components.forEach(c => { if (c.weight && c.expiry && c.avail === 'ok') confirmed++; });
  const total = components.length;
  const allDone = total > 0 && confirmed === total;

  const componentsHtml = total > 0
    ? components.map((c, ci) => renderComponentCard(c, i, ci)).join('')
    : `<div class="kasse-empty">Komponenter ikke registrert ennå. ${escHtml(cleanedItemName)} ble ikke pipet gjennom checkout med komponentliste — registrer manuelt eller pakk som én vare.</div>`;

  return `
  <div class="kasse-card" id="kasse-${i}">
    <div class="kasse-head">
      <div class="kasse-info">
        <div class="kasse-title">${escHtml(titleBase)} · ${escHtml(personLabel)}</div>
        <div class="kasse-meta">${escHtml(item.name || '')}</div>
      </div>
      ${total > 0 ? `<span class="kasse-progress${allDone ? ' green' : ''}">${confirmed}/${total} bekreftet</span>` : ''}
    </div>
    <div class="kasse-components">${componentsHtml}</div>
    <div class="item-comment-row" style="margin-top:10px">
      <textarea class="item-comment-input" id="item-comment-${i}" rows="1"
        placeholder="Merknad til hele kassen…"
        oninput="onItemComment('${currentOrderId}',${i},this.value)">${s.itemComment||''}</textarea>
    </div>
  </div>`;
}

// Hver komponent inne i en kasse er en mini "item-card" — har egen avail/vekt/holdbarhet.
function renderComponentCard(c, i, ci) {
  const statusClass = c.avail ? `status-${c.avail}` : '';

  };
  const expectedHint = c.expected ? ` <span style="font-size:11px;color:var(--muted);font-weight:400">(forv. ${escHtml(c.expected)})</span>` : '';
  return `

      <div class="field-group">

            placeholder="0" value="${escHtml(c.weight)}"

          <span style="font-size:12px;font-weight:600;color:var(--muted);padding:0 6px;align-self:center">${escHtml(c.weightUnit||'g')}</span>

      </div>
    </div>
  </div>`;
}

function escHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ─── PERSIST STATE ───────────────────────────
let ORDER_NOTES = {};

function saveState() {
  try {
    localStorage.setItem('havøyet_state', JSON.stringify(STATE));
    serverPost('/api/packing-state', STATE);
  } catch(e) {}
}
function restoreState() {
  try {
    const raw = localStorage.getItem('havøyet_state');
    if (!raw) return;
    const saved = JSON.parse(raw);
    Object.keys(saved).forEach(id => {
      if (STATE[id]) {
        // Beholder forventet kasse-struktur fra initState om saved mangler den
        const order = ORDERS.find(o => o.id === id);
        const merged = (saved[id] || []).map((entry, i) => {
          const item = order && order.items && order.items[i];
          const k = item ? parseKasseInfo(item.name || '') : null;
          if (k) {
            // Hvis lagret state ikke har kasse-format, oppgrader nå
            if (!entry || !entry.isKasse || !Array.isArray(entry.components)) {
              return { isKasse: true, kasseType: k.type, persons: k.persons, components: initKasseComponents(k), itemComment: (entry && entry.itemComment) || '' };
            }
            return entry;
          }
          return entry || { weight:'', expiry:'', weightUnit:'g', avail:null, replacements:[], confirmedReplacement:null, itemComment:'' };
        });
        STATE[id] = merged;
        // Bakoverkompatibilitet for vanlige items
        STATE[id].forEach(it => {
          if (it && !it.isKasse) {
            if (!it.weightUnit) it.weightUnit = 'g';
            if (it.itemComment === undefined) it.itemComment = '';
          }
        });
      }
    });
  } catch(e) {}
}
function saveNotes() {
  try {
    localStorage.setItem('havøyet_notes', JSON.stringify(ORDER_NOTES));
    serverPost('/api/notes', ORDER_NOTES);
  } catch(e) {}
}
function restoreNotes() {
  try {
    const raw = localStorage.getItem('havøyet_notes');
    if (raw) ORDER_NOTES = JSON.parse(raw);
  } catch(e) {}
}
function onNoteChange(orderId, val) {
  ORDER_NOTES[orderId] = val;
  saveNotes();
}

function onItemComment(orderId, i, val) {
  STATE[orderId][i].itemComment = val;
  saveState();
}

// ─── KASSE-KOMPONENT-HANDLERS ────────────────
function setComponentAvail(orderId, i, ci, val) {
  const entry = STATE[orderId][i];
  if (!entry || !entry.isKasse) return;
  const c = entry.components[ci];
  if (!c) return;
  if (c.avail === val) {
    c.avail = null; c.weight = ''; c.expiry = '';
  } else {
    c.avail = val;
    if (val !== 'ok') { c.weight = ''; c.expiry = ''; }
  }
  saveState();
  renderDetail();
  updateToolbar();
}

function onComponentField(orderId, i, ci, field, val) {
  const entry = STATE[orderId][i];
  if (!entry || !entry.isKasse) return;
  const c = entry.components[ci];
  if (!c) return;
  c[field] = val;
  // Oppdater progress-bar live
  const o = ORDERS.find(x => x.id === orderId);
  const { confirmed, total } = countConfirmed(STATE[orderId]);
  const pct = total ? Math.round(confirmed/total*100) : 0;
  const bar = document.getElementById('detailProgressBar');
  if (bar) bar.style.width = pct + '%';
  saveState();
  updateToolbar();
}

// ─── STATE HANDLERS ──────────────────────────
function setAvail(orderId, i, val) {
  const s = STATE[orderId][i];
  // Klikk på allerede valgt knapp → fjern valget
  if (s.avail === val) {
    s.avail = null;
    s.weight = ''; s.expiry = '';
    saveState(); renderDetail(); updateToolbar();
    return;
  }
  s.avail = val;
  if (val === 'ok') { s.replacements = []; }
  else              { s.weight = ''; s.expiry = ''; }
  saveState();
  renderDetail();
  updateToolbar();
  if (val !== 'ok') setTimeout(() => { const el = document.getElementById('search-'+i); if(el) el.focus(); }, 50);
}

function onFieldChange(orderId, i, field, val) {
  STATE[orderId][i][field] = val;
  const inputEl = document.getElementById((field==='weight'?'weight':'expiry')+'-'+i);
  if (inputEl) inputEl.classList.toggle('filled', val && val.trim() !== '');
  // Update progress bar
  const o = ORDERS.find(x=>x.id===orderId);
  const s = STATE[orderId];
  const { confirmed, total } = countConfirmed(s);
  const pct = total ? Math.round(confirmed/total*100) : 0;
  const bar = document.getElementById('detailProgressBar');
  if (bar) bar.style.width = pct + '%';
  saveState();
  updateToolbar();
}

function onSearch(orderId, i, query) {
  const q = query.toLowerCase().trim();
  const resultsEl = document.getElementById('results-'+i);
  if (!q) { resultsEl.innerHTML=''; resultsEl.classList.remove('visible'); return; }
  const matches = FISH_DB.filter(f => f.name.toLowerCase().includes(q) || f.category.toLowerCase().includes(q));
  if (!matches.length) {
    resultsEl.innerHTML=`<div style="padding:12px 14px;font-size:13px;color:var(--muted)">Ingen treff på «${query}»</div>`;
    resultsEl.classList.add('visible'); return;
  }
  const selected = STATE[orderId][i].replacements;
  resultsEl.innerHTML = matches.map(f => {
    const isSel = selected.includes(f.id);
    return `<div class="result-item ${isSel?'selected':''}" onclick="toggleReplacement('${orderId}',${i},'${f.id}')">
      <div class="result-check">${isSel?`<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`:''}</div>
      <span class="result-name">${f.name}</span>
      <span class="result-detail">${f.category} · ${f.unit}</span>
    </div>`;
  }).join('');
  resultsEl.classList.add('visible');
}

function toggleReplacement(orderId, i, fishId) {
  const s = STATE[orderId][i];
  s.replacements = s.replacements.includes(fishId)
    ? s.replacements.filter(id=>id!==fishId)
    : [...s.replacements, fishId];
  const q = document.getElementById('search-'+i)?.value || '';
  onSearch(orderId, i, q);
  updateChips(orderId, i);
}

function removeReplacement(orderId, i, fishId) {
  STATE[orderId][i].replacements = STATE[orderId][i].replacements.filter(id=>id!==fishId);
  updateChips(orderId, i);
}

function updateChips(orderId, i) {
  const chipsEl = document.getElementById('chips-'+i);
  if (!chipsEl) return;
  const s = STATE[orderId][i];
  chipsEl.innerHTML = s.replacements.map(fid => {
    const f = FISH_DB.find(x=>x.id===fid);
    if (!f) return '';
    const isConfirmed = s.confirmedReplacement === fid;
    return `<span class="replacement-chip ${isConfirmed ? 'confirmed' : ''}">
      ${isConfirmed ? '<svg style="width:12px;height:12px;flex-shrink:0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>' : ''}
      ${f.name}
      ${!isConfirmed ? `<button class="chip-confirm" onclick="confirmReplacement('${orderId}',${i},'${fid}')">Bekreft</button>` : ''}
      <button class="chip-remove" onclick="removeReplacement('${orderId}',${i},'${fid}')">✕</button>
    </span>`;
  }).join('');

  // Oppdater varenavn i kortets header
  const nameEl = document.getElementById('item-name-'+i);
  if (nameEl) {
    const confirmed = s.confirmedReplacement ? FISH_DB.find(x=>x.id===s.confirmedReplacement) : null;
    const order = ORDERS.find(x=>x.id===orderId);
    const originalItem = order ? order.items[i] : null;
    const originalName = originalItem ? formatItemName(originalItem) : '';
    if (confirmed) {
      nameEl.innerHTML = `<span class="item-name replaced">${originalName}</span> <span class="item-name-replacement">${confirmed.name}</span>`;
    } else {
      nameEl.innerHTML = originalName;
    }
  }
}

function confirmReplacement(orderId, i, fishId) {
  const s = STATE[orderId][i];
  // Klikk på allerede bekreftet = angre
  s.confirmedReplacement = s.confirmedReplacement === fishId ? null : fishId;
  updateChips(orderId, i);
  saveState();
}

function setWeightUnit(orderId, i, unit) {
  STATE[orderId][i].weightUnit = unit;
  saveState();
  // Oppdater toggle-knapper uten å re-rendre hele kortet
  const card = document.getElementById('card-'+i);
  if (!card) return;
  card.querySelectorAll('.unit-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.trim() === unit);
  });
}

// ─── TOOLBAR ────────────────────────────────
function updateToolbar() {
  const o = ORDERS.find(x=>x.id===currentOrderId);
  if (!o) return;
  const s = STATE[currentOrderId];
  // Tell både vanlige varer og kasse-komponenter
  let handled = 0;
  (s || []).forEach(e => {
    if (e && e.isKasse) (e.components || []).forEach(c => { if (c.avail !== null) handled++; });
    else if (e && e.avail !== null) handled++;
  });
  const { confirmed, total } = countConfirmed(s);
  document.getElementById('toolbarStatus').textContent =
    `${handled}/${total} varer behandlet  ·  ${confirmed} klar for etikett`;
  document.getElementById('btnPrint').disabled = confirmed === 0;
}

document.getElementById('btnPrint').addEventListener('click', () => {

document.getElementById('btnSave').addEventListener('click', () => {
