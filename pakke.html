// ─── LIVE SYNC (cross-device packing state) ──
let _lastSyncHash = '';

async function pollPackingState() {
  try {
    const r = await fetch(`${FLASK_BASE}/api/packing-state`, { signal: AbortSignal.timeout(3000) });
    if (!r.ok) return;
    const serverState = await r.json();
    if (!serverState || !Object.keys(serverState).length) return;

    const hash = JSON.stringify(serverState);
    if (hash === _lastSyncHash) return; // ingen endring
    _lastSyncHash = hash;

    // Oppdater STATE for alle ordre unntatt den som er åpen (for å unngå å overskrive pågående redigering)
    let changed = false;
    Object.keys(serverState).forEach(id => {
      if (id === currentOrderId) return; // ikke forstyrr pågående redigering
      if (STATE[id] && JSON.stringify(STATE[id]) !== JSON.stringify(serverState[id])) {
        STATE[id] = serverState[id];
        changed = true;
      }
    });

    if (changed) {
      localStorage.setItem('havøyet_state', JSON.stringify(STATE));
      if (currentOrderId === null) {
        renderList(); // oppdater listevisning umiddelbart
      }
      // Vis en kort melding om at data er synkronisert
      showToast('Synkronisert fra annen enhet');
    }
  } catch(e) { /* server ikke nådd */ }
}

setInterval(pollPackingState, 15000); // poll hvert 15. sekund

// ─── PRODUKTOVERSIKT ─────────────────────────

let currentTab = 'bestillinger';
let currentProduct = null;

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tabBestillinger').classList.toggle('active', tab === 'bestillinger');
  document.getElementById('tabInnkjop').classList.toggle('active', tab === 'innkjop');
  document.getElementById('ordreListContent').style.display  = tab === 'bestillinger' ? '' : 'none';
  document.getElementById('prodListContent').style.display   = tab === 'innkjop'      ? '' : 'none';
  document.getElementById('prodDetailContent').style.display = 'none';
  if (tab === 'innkjop') { updateProdRangeMeta(); renderProductList(); }
}

// Parser variant-streng (f.eks. "500 g per pkg") og vekter den med qty.
// itemUnit (valgfri): brukes når variantStr er tom — gjelder typisk admin-laget
// manuell ordre der mengden er oppgitt direkte med enhet på hver linje.
function parseVariantQty(variantStr, qty, itemUnit) {
  if (!variantStr) {
    const u = String(itemUnit || '').toLowerCase();
    if (u === 'kg') return { amount: Number(qty) * 1000, unit: 'g' };
    if (u === 'g')  return { amount: Number(qty),        unit: 'g' };
    return { amount: Number(qty), unit: 'stk' };
  }
  const m = variantStr.match(/^(\d+(?:[.,]\d+)?)\s*(g|kg|stk)\b/i);
  if (!m) return { amount: Number(qty), unit: String(itemUnit||'').toLowerCase() === 'kg' ? 'g' : (itemUnit || 'stk') };
  const num  = parseFloat(m[1].replace(',', '.'));
  const unit = m[2].toLowerCase();
  if (unit === 'kg') return { amount: num * qty * 1000, unit: 'g' };
  if (unit === 'g')  return { amount: num * qty,        unit: 'g' };
  return { amount: num * qty, unit: 'stk' };
}

function formatTotal(amount, unit) {
  if (unit === 'g') {
    if (amount >= 1000 && amount % 1000 === 0) return `${amount / 1000} kg`;
    if (amount >= 1000) return `${(amount / 1000).toFixed(1).replace('.0', '')} kg`;
    return `${amount} g`;
  }
  return `${amount} stk`;
}

// ── PERIODE-VELGER FOR INNKJØPSLISTE ─────────
let _prodRange     = '1w'; // '2d' | '1w' | '1m' | 'custom'
let _prodCustomFrom = todayISO;
let _prodCustomTo   = (() => { const d=new Date(_T); d.setDate(d.getDate()+30); return isoDate(d); })();

function _addDaysISO(iso, n) {
  const d = new Date(iso + 'T00:00:00');
  d.setDate(d.getDate() + n);
  return isoDate(d);
}
function prodRangeBounds() {
  if (_prodRange === '2d')     return [todayISO, _addDaysISO(todayISO, 2)];
  if (_prodRange === '1m')     return [todayISO, _addDaysISO(todayISO, 30)];
  if (_prodRange === 'custom') return [_prodCustomFrom || todayISO, _prodCustomTo || _addDaysISO(todayISO, 30)];
  return [todayISO, _addDaysISO(todayISO, 7)]; // default 1w
}
function _fmtRangeShort(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('nb-NO', { day: '2-digit', month: '2-digit' });
}
function updateProdRangeMeta() {
  const [from, to] = prodRangeBounds();
  const meta = document.getElementById('prodRangeMeta');
  if (meta) meta.textContent = `${_fmtRangeShort(from)} – ${_fmtRangeShort(to)}`;
}
function setProdRange(r) {
  _prodRange = r;
  ['2d','1w','1m','Custom'].forEach(id => {
    const btn = document.getElementById('prodR' + id);
    const key = id === 'Custom' ? 'custom' : id.toLowerCase();
    if (btn) btn.classList.toggle('active', r === key);
  });
  const box = document.getElementById('prodRangeCustomBox');
  if (box) box.style.display = r === 'custom' ? 'inline-flex' : 'none';
  if (r === 'custom') {
    document.getElementById('prodRangeFrom').value = _prodCustomFrom;
    document.getElementById('prodRangeTo').value   = _prodCustomTo;
  }
  updateProdRangeMeta();
  renderProductList();
}
function onProdCustomChange() {
  _prodCustomFrom = document.getElementById('prodRangeFrom').value || todayISO;
  _prodCustomTo   = document.getElementById('prodRangeTo').value   || _addDaysISO(todayISO, 30);
  if (_prodRange === 'custom') { updateProdRangeMeta(); renderProductList(); }
}

function buildProductSummary() {
  const products = new Map();
  // Innkjøpslisten reflekterer kun ordre i valgt periode (default 1 uke fra
  // i dag). Brukeren kan endre periode via knappene over listen.
  const [rangeFrom, rangeTo] = prodRangeBounds();
  ORDERS.filter(storeFilter).filter(o => {
    const d = String(o.delivery || '').slice(0, 10);
    return d && d >= rangeFrom && d <= rangeTo;
  }).forEach(o => {
    const s = STATE[o.id] || [];
    o.items.forEach((item, idx) => {
      const pName = item.productName || item.name;
      if (!products.has(pName)) products.set(pName, { variants: new Map(), totalOrders: 0, confirmedOrders: 0 });
      const p = products.get(pName);
      p.totalOrders++;
      const itemState = s[idx];
      if (itemState && itemState.weight && itemState.expiry && itemState.avail === 'ok') {
        p.confirmedOrders++;
      }
      const vStr = item.variantStr || '';
      // For manuelle ordre er enheten på linjen (kg/g/stk) — for Stripe ligger den i variantStr.
      // Bruker item.unit som key-tillegg så samme produkt med ulik enhet ikke blandes.
      const variantKey = vStr || (item.unit ? `__unit:${item.unit}` : '');
      if (!p.variants.has(variantKey)) {
        const { amount, unit } = parseVariantQty(vStr, item.qty, item.unit);
        p.variants.set(variantKey, { amount: 0, unit, orders: [], displayLabel: vStr });
      }
      const v = p.variants.get(variantKey);
      const { amount } = parseVariantQty(vStr, item.qty, item.unit);
      v.amount += amount;
      v.orders.push({ id: o.id, customer: o.customer, qty: item.qty, unit: item.unit || '', variantStr: vStr });
    });
  });
  return products;
}

function renderProductList() {
  const products = buildProductSummary();
  const listEl   = document.getElementById('prodList');
  const countEl  = document.getElementById('prodListCount');
  countEl.textContent = products.size + ' produkt' + (products.size !== 1 ? 'er' : '');
  if (products.size === 0) {
    listEl.innerHTML = `<div class="empty-state"><h2>Ingen bestillinger</h2><p>Når kunder bestiller på havoyet.no vises innkjøpslisten her.</p></div>`;
    return;
  }
  listEl.innerHTML = '';
  products.forEach((p, pName) => {
    const pct      = p.totalOrders ? Math.round(p.confirmedOrders / p.totalOrders * 100) : 0;
    const mangler  = p.totalOrders - p.confirmedOrders;
    const barClass = pct === 100 ? 'green' : pct >= 50 ? 'orange' : 'red';
    const rowClass = pct === 100 ? 'ps-green' : pct >= 50 ? 'ps-orange' : 'ps-red';
    const badgeHtml = mangler > 0
      ? `<span class="prod-badge mangler">${mangler} mangler</span>`
      : `<span class="prod-badge klar">Klar ✓</span>`;
    let totalGrams = 0, totalStk = 0, hasGrams = false, hasStk = false;
    p.variants.forEach(v => {
      if (v.unit === 'g') { totalGrams += v.amount; hasGrams = true; }
      else                { totalStk   += v.amount; hasStk   = true; }
    });
    let totalStr = '';
    if (hasGrams && hasStk)      totalStr = formatTotal(totalGrams, 'g') + ' + ' + formatTotal(totalStk, 'stk');
    else if (hasGrams)           totalStr = formatTotal(totalGrams, 'g');
    else                         totalStr = formatTotal(totalStk, 'stk');
    const row = document.createElement('div');
    row.className = `prod-row ${rowClass}`;
    row.onclick = () => openProductDetail(pName);
    row.innerHTML = `
      <div class="prod-main">
        <div class="prod-name">${pName}</div>
        <div class="prod-qty">${totalStr}</div>
      </div>
      <div class="prod-right">
        ${badgeHtml}
        <div class="prod-bar-bg"><div class="prod-bar ${barClass}" style="width:${pct}%"></div></div>
        <span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)">${p.confirmedOrders}/${p.totalOrders}</span>
        <svg class="prod-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
    `;
    listEl.appendChild(row);
  });
}

function openProductDetail(productName) {
  currentProduct = productName;
  document.getElementById('prodListContent').style.display   = 'none';
  document.getElementById('prodDetailContent').style.display = '';
  renderProductDetail(productName);
  if (!_navMuted) history.pushState({ view: 'product', name: productName }, '', `?produkt=${encodeURIComponent(productName)}`);
}

function showProductList() {
  currentProduct = null;
  document.getElementById('prodDetailContent').style.display = 'none';
  document.getElementById('prodListContent').style.display   = '';
  if (!_navMuted) history.pushState({ view: 'innkjop' }, '', '?tab=innkjop');
}

function renderProductDetail(productName) {
  const products = buildProductSummary();
  const p = products.get(productName);
  if (!p) return;
  const mangler = p.totalOrders - p.confirmedOrders;
  const badgeHtml = mangler > 0
    ? `<span class="prod-badge mangler">${mangler} mangler</span>`
    : `<span class="prod-badge klar">Klar ✓</span>`;
  let html = `
    <div class="prod-detail-header">
      <div class="prod-detail-title">${productName}</div>
      <div class="prod-detail-meta">
        ${badgeHtml}
        <span class="prod-detail-meta-chip">${p.confirmedOrders}/${p.totalOrders} bestillinger bekreftet</span>
      </div>
    </div>
    <div class="section-label">Varianter bestilt</div>
  `;
  p.variants.forEach((v, key) => {
    const label = v.displayLabel || (key.startsWith('__unit:') ? '' : key) || 'Standard';
    const totalStr = formatTotal(v.amount, v.unit);
    const orderChips = v.orders.map(ord =>
      `<span class="order-ref" onclick="event.stopPropagation();goToOrder('${ord.id}')">
        ${ord.customer} · ${ord.qty}${ord.unit ? ' ' + ord.unit : ' stk'}
      </span>`
    ).join('');
    html += `
      <div class="variant-card">
        <div class="variant-header">
          <span class="variant-name">${label}</span>
          <span class="variant-qty">${totalStr} totalt</span>
        </div>
        <div class="order-refs">${orderChips}</div>
      </div>
    `;
  });
  document.getElementById('prodDetailInner').innerHTML = html;
}

function goToOrder(orderId) {
  currentTab = 'bestillinger';
  document.getElementById('tabBestillinger').classList.add('active');
  document.getElementById('tabInnkjop').classList.remove('active');
  document.getElementById('prodDetailContent').style.display = 'none';
  document.getElementById('prodListContent').style.display   = 'none';
  document.getElementById('ordreListContent').style.display  = '';
  openOrder(orderId);
}

// ─── HISTORY / TILBAKE-KNAPP ─────────────────
// Hver intern view-skifte (åpne ordre, åpne produkt, bytte fane) pusher en
// ny entry til history.state. Når brukeren trykker tilbake i nettleseren
// ruter vi til riktig view i stedet for å forlate siden.
let _navMuted = false;
window.addEventListener('popstate', (e) => {
  _navMuted = true;
  try {
    const s = e.state || {};
    if (s.view === 'detail' && s.id) {
      currentTab = 'bestillinger';
      document.getElementById('tabBestillinger').classList.add('active');
      document.getElementById('tabInnkjop').classList.remove('active');
      openOrder(s.id);
    } else if (s.view === 'product' && s.name) {
      currentTab = 'innkjop';
      document.getElementById('tabBestillinger').classList.remove('active');
      document.getElementById('tabInnkjop').classList.add('active');
      document.getElementById('viewList').style.display   = 'block';
      document.getElementById('viewDetail').style.display = 'none';
      document.getElementById('detailToolbar').style.display = 'none';
      document.getElementById('listFooter').style.display = 'flex';
      currentOrderId = null;
      openProductDetail(s.name);
    } else if (s.view === 'innkjop') {
      currentTab = 'innkjop';
      switchTab('innkjop');
      showList();
    } else {
      currentTab = 'bestillinger';
      switchTab('bestillinger');
      showList();
    }
  } finally {
    _navMuted = false;
  }
});

initStoreSwitcher();
loadFromFlask();
// Initialiser history-state slik at popstate har noe å gå tilbake til
history.replaceState({ view: 'list' }, '', window.location.search || window.location.pathname);
